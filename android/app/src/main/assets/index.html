        // --- 顯示自訂訊息框 ---
        function showMessage(text) {
            state.modalMessage = text;
            state.showModal = 'messageBox';
            render();
        }

        // --- 事件處理 ---
        function attachEvents() {
            const buttons = document.querySelectorAll('.action-btn');
            buttons.forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', async event => {
                    event.preventDefault();
                    const action = newBtn.getAttribute('data-action');
                    state.errorMsg = ''; // 重置錯誤訊息
                    
                    // 刪除與重置數據
                    if (action === 'resetData') {
                        resetDemoData();
                        render();
                        setTimeout(() => showMessage('所有數據已清除，請重新設定。'), 100);
                        return;
                    }

                    // Onboarding 操作
                    if (action === 'setRole') {
                        state.role = newBtn.getAttribute('data-role');
                        state.userAvatar = null; // 重置頭像確保切換角色時重新賦予預設值
                        state.onboardingStep = 2;
                        render();
                    } 
                    else if (action === 'backStep') {
                        state.onboardingStep = parseInt(newBtn.getAttribute('data-step'));
                        render();
                    }
                    else if (action === 'selectAvatar') {
                        state.userAvatar = newBtn.getAttribute('data-avatar');
                        // 保留輸入框的值
                        const nameInput = document.getElementById('nameInput');
                        if (nameInput) state.userName = nameInput.value;
                        render();
                    }
                    else if (action === 'submitProfile') {
                        const nameInput = document.getElementById('nameInput');
                        if (!nameInput.value.trim()) {
                            state.errorMsg = '請輸入您的稱呼！';
                            render();
                            return;
                        }
                        state.userName = nameInput.value.trim();
                        state.onboardingStep = 3;
                        render();
                    }
                    else if (action === 'setConnectionMode') {
                        state.connectionMode = newBtn.getAttribute('data-mode');
                        render();
                    }
                    else if (action === 'copyCode') {
                        // 模擬複製功能
                        navigator.clipboard?.writeText(state.calendarCode).catch(() => {});
                        showMessage('已複製邀請碼！分享給家人吧。');
                    }
                    else if (action === 'submitJoinCode') {
                        const joinCodeInput = document.getElementById('joinCodeInput');
                        if (!joinCodeInput.value || joinCodeInput.value.length !== 6) {
                            state.errorMsg = '請輸入正確的6位數字邀請碼！';
                            render();
                            return;
                        }
                        try {
                            await connectFamily(joinCodeInput.value, false);
                            state.appReady = true;
                            render();
                            setTimeout(() => showMessage('成功加入同步家庭日曆！'), 500);
                        } catch (error) {
                            state.errorMsg = error.message === 'family-not-found' ? '找不到這個家庭碼，請確認家人已建立。' : '加入失敗，請稍後再試。';
                            render();
                        }
                    }
                    else if (action === 'finishOnboarding') {
                        if (!state.calendarCode) state.calendarCode = Math.floor(100000 + Math.random() * 900000).toString();
                        await connectFamily(state.calendarCode, true);
                        state.appReady = true;
                        render();
                        setTimeout(() => showMessage(`已建立同步家庭日曆！邀請碼是 ${state.calendarCode}。`), 500);
                    }
                    // 主應用程式操作
                    else if (action === 'switchTab') {
                        state.currentTab = newBtn.getAttribute('data-tab');
                        if (state.currentTab === 'chat') shouldStickChatToBottom = true;
                        if (state.backendMode === 'server' && state.familyId && state.currentTab === 'calendar') {
                            await refreshServerMemories(state.familyId).catch(error => console.warn('Calendar refresh failed', error));
                        }
                        if (state.backendMode === 'server' && state.familyId && state.currentTab === 'chat') {
                            await refreshServerMessages(state.familyId).catch(error => console.warn('Chat refresh failed', error));
                        }
                        render();
                    }
                    else if (action === 'switchCalendar') {
                        state.calendarMode = newBtn.getAttribute('data-mode');
                        render();
                    }
                    else if (action === 'openModal') {
                        state.showModal = newBtn.getAttribute('data-modal');
                        state.pendingMemoryType = 'text';
                        state.pendingMemoryImage = '';
                        if (state.showModal === 'videoPlayer') {
                            state.videoUrl = null;
                            state.videoError = null;
                            state.videoGenerating = false;
                        }
                        render();
                    }
                    else if (action === 'generateVideo') {
                        state.videoGenerating = true;
                        state.videoError = null;
                        render();
                        try {
                            const familyId = state.familyId || state.calendarCode;
                            const result = await serverApi(`/api/families/${encodeURIComponent(familyId)}/summary-video`, {
                                method: 'POST',
                                body: JSON.stringify({
                                    month: today.getMonth() + 1,
                                    year: today.getFullYear()
                                })
                            });
                            if (result.error) {
                                state.videoError = result.message || '沒有照片可生成影片';
                            } else {
                                state.videoUrl = `${selfHostedApiBase}${result.videoUrl}`;
                            }
                        } catch (error) {
                            console.error('[video] generation failed', error);
                            state.videoError = '影片生成失敗，請稍後再試。';
                        }
                        state.videoGenerating = false;
                        render();
                    }
                    else if (action === 'requestNotifications') {
                        await requestNotificationPermission();
                        if (state.notificationPermission === 'granted') {
                            await refreshCurrentPushTokenInfo().catch(() => null);
                            showMessage(getPushStatusSummary());
                        }
                    }
                    else if (action === 'installApp') {
                        await installPwaApp();
                    }
                    else if (action === 'closeModal') {
                        const mv = document.getElementById('memVideo');
                        if (mv) { mv.pause(); mv.src = ''; }
                        state.showModal = null;
                        state.selectedDate = null;
                        state.pendingMemoryContent = '';
                        state.videoUrl = null;
                        state.videoError = null;
                        state.videoGenerating = false;
                        render();
                    }
                    else if (action === 'viewMemories') {
                        state.selectedDate = newBtn.getAttribute('data-date');
                        state.showModal = 'memoryDetail';
                        render();
                    }
                    else if (action === 'selectMemoryType') {
                        const memoryContentInput = document.getElementById('memoryContentInput');
                        if (memoryContentInput) state.pendingMemoryContent = memoryContentInput.value;
                        state.pendingMemoryType = newBtn.getAttribute('data-type');
                        if (state.pendingMemoryType !== 'photo') state.pendingMemoryImage = '';
                        render();
                    }
                    else if (action === 'chooseMemoryImage') {
                        const imageInput = document.getElementById('memoryImageInput');
                        imageInput?.click();
                    }
                    else if (action === 'saveMemory') {
                        const memoryContentInput = document.getElementById('memoryContentInput');
                        const content = memoryContentInput?.value.trim();
                        if (!content) {
                            state.errorMsg = '請先寫低一點內容。';
                            render();
                            return;
                        }

                        const memoryData = {
                            uid: state.authUid || 'local',
                            date: today.getDate(),
                            month: today.getMonth() + 1,
                            year: today.getFullYear(),
                            childId: state.role === 'child' ? 'child_1' : 'senior',
                            childName: state.userName || (state.role === 'child' ? '我' : '媽媽'),
                            type: state.pendingMemoryType,
                            content: state.pendingMemoryType === 'audio' ? `錄音分享：${content}` : content,
                            img: state.pendingMemoryType === 'photo' ? (state.pendingMemoryImage || null) : null
                        };

                        if (state.backendMode === 'server' && state.familyId) {
                            try {
                                await serverApi(`/api/families/${encodeURIComponent(state.familyId)}/memories`, {
                                    method: 'POST',
                                    body: JSON.stringify(memoryData)
                                });
                                await refreshServerMemories(state.familyId);
                                state.points += 10;
                                state.showModal = null;
                                state.pendingMemoryType = 'text';
                                state.pendingMemoryContent = '';
                                state.pendingMemoryImage = '';
                                render();
                                setTimeout(() => showMessage('已儲存今日回憶到自架服務器，並獲得 10 積分。'), 100);
                            } catch (error) {
                                console.warn('Server memory save failed', error);
                                showMessage('回憶儲存失敗，請檢查自架服務器後重試。');
                            }
                            return;
                        }

                        // Local fallback
                        const newMemory = { id: Date.now(), ...memoryData };
                        state.memories.unshift(newMemory);
                        state.points += 10;
                        state.showModal = null;
                        state.pendingMemoryType = 'text';
                        state.pendingMemoryContent = '';
                        state.pendingMemoryImage = '';
                        render();
                        setTimeout(() => showMessage('已儲存今日回憶，並獲得 10 積分。'), 100);
                    }
                    else if (action === 'sendMessage') {
                        sendChatMessage();
                    }
                    else if (action === 'toggleVoice') {
                        await toggleVoiceMessage(newBtn.getAttribute('data-message-id'));
                    }
                    else if (action === 'selectChatImage') {
                        document.getElementById('chatImageInput')?.click();
                    }
                    else if (action === 'summarizeVoice') {
                        await summarizeVoiceMessage(newBtn.getAttribute('data-message-id'));
                    }
                    else if (action === 'transcribeVoice') {
                        await transcribeVoiceMessage(newBtn.getAttribute('data-message-id'));
                    }
                    else if (action === 'shareSummary') {
                        state.showModal = null;
                        state.currentTab = 'chat';
                        shouldStickChatToBottom = true;
                        render();
                        setTimeout(() => {
                            addSystemReply('已收到本週家庭回憶摘要，今晚一齊睇返啲相啦。');
                            showMessage('摘要已模擬分享至家庭聊天室。');
                        }, 700);
                    }
                    else if (action === 'claimDailyReward') {
                        if (state.dailyMessages < 5 || state.claimedDailyReward) return;
                        state.points += 50;
                        state.claimedDailyReward = true;
                        render();
                        setTimeout(() => showMessage('已領取今日 50 積分。'), 100);
                    }
                    else if (action === 'redeemReward') {
                        const rewardId = parseInt(newBtn.getAttribute('data-reward-id'));
                        const reward = state.rewards.find(item => item.id === rewardId);
                        if (!reward || state.redeemedRewards.includes(rewardId)) return;
                        if (state.points < reward.points) {
                            showMessage('積分未夠，繼續同家人互動就可以累積更多。');
                            return;
                        }
                        state.points -= reward.points;
                        state.redeemedRewards.push(rewardId);
                        render();
                        setTimeout(() => showMessage(`已成功兌換「${reward.title}」。`), 100);
                    }
                });
            });

            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('input', event => {
                    chatDraft = event.target.value;
                });
                chatInput.addEventListener('keydown', event => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        sendChatMessage();
                    }
                });
            }

            document.querySelectorAll('.voice-seek-bar').forEach(bar => {
                bar.addEventListener('click', event => {
                    const rect = bar.getBoundingClientRect();
                    const ratio = rect.width ? (event.clientX - rect.left) / rect.width : 0;
                    seekVoiceMessage(bar.getAttribute('data-message-id'), ratio);
                });
            });

            const memoryImageInput = document.getElementById('memoryImageInput');
            if (memoryImageInput) {
                memoryImageInput.addEventListener('change', async event => {
                    const file = event.target.files?.[0];
                    if (!file) return;
                    state.pendingMemoryImage = await readFileAsDataUrl(file);
                    const memoryContentInput = document.getElementById('memoryContentInput');
                    if (memoryContentInput) state.pendingMemoryContent = memoryContentInput.value;
                    render();
                });
            }

            const chatImageInput = document.getElementById('chatImageInput');
            if (chatImageInput) {
                chatImageInput.addEventListener('change', async event => {
                    const file = event.target.files?.[0];
                    if (!file) return;
                    const img = await readFileAsDataUrl(file);
                    await sendChatMessage({ type: 'photo', content: '傳送了一張相片', img });
                });
            }

            const voiceHoldButton = document.getElementById('voiceHoldButton');
            if (voiceHoldButton) attachVoiceHoldEvents(voiceHoldButton);

            // 日曆月份導航按鈕（箭頭切換月份）
            document.querySelectorAll('.calendar-nav-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    event.stopPropagation();
                    const dir = parseInt(btn.getAttribute('data-calendar-dir'));
                    navigateCalendarMonth(dir);
                });
            });

            // 日曆滑動手勢
            setupCalendarSwipe();
        }

        // --- 日曆導航 ---
        // 箭頭按鈕：切換月份
        function navigateCalendarMonth(dir) {
            const container = document.getElementById('calendarPageContainer');
            const page = document.getElementById('calendarPage');
            if (!container || !page) {
                changeCalendarMonth(dir);
                return;
            }

            let newMonth = state.calendarMonth + dir;
            let newYear = state.calendarYear;
            if (newMonth > 12) { newMonth = 1; newYear++; }
            else if (newMonth < 1) { newMonth = 12; newYear--; }

            let visibleMemories = state.memories;
            if (state.role === 'child') visibleMemories = visibleMemories.filter(m => m.childId === 'child_1');
            const newHtml = state.calendarMode === 'tear-off'
                ? tearOffPageHtml(Math.min(state.calendarDay || today.getDate(), new Date(newYear, newMonth, 0).getDate()), newYear, newMonth, visibleMemories)
                : monthlyPageHtml(newYear, newMonth, visibleMemories);

            doCalendarTransition(page, container, dir, newHtml, () => {
                state.calendarMonth = newMonth;
                state.calendarYear = newYear;
                // 手撕日曆：如果新月的天數比當前日期小，調整日期
                if (state.calendarMode === 'tear-off') {
                    const maxDay = new Date(newYear, newMonth, 0).getDate();
                    if (state.calendarDay > maxDay) state.calendarDay = maxDay;
                } else {
                    state.calendarDay = null;
                }
                updateCalendarContent();
            });
        }

        // 滑動：切換日期（手撕）或月份（月曆）
        function navigateCalendarSwipe(dir) {
            const container = document.getElementById('calendarPageContainer');
            const page = document.getElementById('calendarPage');
            if (!container || !page) {
                if (state.calendarMode === 'tear-off') changeCalendarDay(dir);
                else changeCalendarMonth(dir);
                return;
            }

            let newHtml = '';
            let onDone = () => {};

            if (state.calendarMode === 'tear-off') {
                // 滑動切換日期
                let newDay = (state.calendarDay || today.getDate()) + dir;
                let newMonth = state.calendarMonth;
                let newYear = state.calendarYear;
                const dim = new Date(newYear, newMonth, 0).getDate();
                if (newDay < 1) {
                    newMonth--;
                    if (newMonth < 1) { newMonth = 12; newYear--; }
                    newDay = new Date(newYear, newMonth, 0).getDate();
                } else if (newDay > dim) {
                    newMonth++;
                    if (newMonth > 12) { newMonth = 1; newYear++; }
                    newDay = 1;
                }
                let visibleMemories = state.memories;
                if (state.role === 'child') visibleMemories = visibleMemories.filter(m => m.childId === 'child_1');
                newHtml = tearOffPageHtml(newDay, newYear, newMonth, visibleMemories);
                onDone = () => {
                    state.calendarDay = newDay;
                    state.calendarMonth = newMonth;
                    state.calendarYear = newYear;
                    updateCalendarContent();
                };
            } else {
                // 滑動切換月份
                let newMonth = state.calendarMonth + dir;
                let newYear = state.calendarYear;
                if (newMonth > 12) { newMonth = 1; newYear++; }
                else if (newMonth < 1) { newMonth = 12; newYear--; }
                let visibleMemories = state.memories;
                if (state.role === 'child') visibleMemories = visibleMemories.filter(m => m.childId === 'child_1');
                newHtml = monthlyPageHtml(newYear, newMonth, visibleMemories);
                onDone = () => {
                    state.calendarMonth = newMonth;
                    state.calendarYear = newYear;
                    state.calendarDay = null;
                    updateCalendarContent();
                };
            }

            doCalendarTransition(page, container, dir, newHtml, onDone);
        }

        // 共用的過渡動畫
        function doCalendarTransition(oldPage, container, dir, newHtml, onDone) {
            const newPage = document.createElement('div');
            newPage.className = 'calendar-page';
            newPage.innerHTML = newHtml;
            newPage.style.position = 'absolute';
            newPage.style.top = '0';
            newPage.style.left = '0';
            newPage.style.right = '0';
            newPage.style.zIndex = '1';
            container.appendChild(newPage);

            const offset = dir > 0 ? '100%' : '-100%';
            newPage.style.transform = `translateX(${offset}) rotate(${dir > 0 ? 3 : -3}deg)`;
            newPage.style.opacity = '0';

            oldPage.offsetHeight;
            newPage.offsetHeight;

            const duration = 350;
            const ease = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            oldPage.style.transition = `transform ${duration}ms ${ease}, opacity ${duration}ms ease`;
            newPage.style.transition = `transform ${duration}ms ${ease}, opacity ${duration}ms ease`;

            const oldOut = dir > 0 ? '-100%' : '100%';
            oldPage.style.transform = `translateX(${oldOut}) rotate(${dir > 0 ? -3 : 3}deg)`;
            oldPage.style.opacity = '0';
            newPage.style.transform = 'translateX(0) rotate(0deg)';
            newPage.style.opacity = '1';

            setTimeout(() => {
                onDone();
            }, duration);
        }

        function changeCalendarDay(dir) {
            const daysInMonth = new Date(state.calendarYear, state.calendarMonth, 0).getDate();
            state.calendarDay = (state.calendarDay || today.getDate()) + dir;
            if (state.calendarDay < 1) {
                state.calendarMonth--;
                if (state.calendarMonth < 1) { state.calendarMonth = 12; state.calendarYear--; }
                state.calendarDay = new Date(state.calendarYear, state.calendarMonth, 0).getDate();
            } else if (state.calendarDay > daysInMonth) {
                state.calendarMonth++;
                if (state.calendarMonth > 12) { state.calendarMonth = 1; state.calendarYear++; }
                state.calendarDay = 1;
            }
            updateCalendarContent();
        }

        function changeCalendarMonth(dir) {
            state.calendarMonth += dir;
            if (state.calendarMonth > 12) {
                state.calendarMonth = 1;
                state.calendarYear++;
            } else if (state.calendarMonth < 1) {
                state.calendarMonth = 12;
                state.calendarYear--;
            }
            state.calendarDay = null;
            updateCalendarContent();
        }

        function setupCalendarSwipe() {
            const container = document.getElementById('calendarPageContainer');
            if (!container) return;

            let startX = 0;
            let startY = 0;
            let dx = 0;
            let isDragging = false;
            let isHorizontal = null;
            let animating = false;
            let hasMoved = false;

            container.addEventListener('touchstart', event => {
                if (animating || event.touches.length !== 1) return;
                startX = event.touches[0].clientX;
                startY = event.touches[0].clientY;
                dx = 0;
                isDragging = true;
                isHorizontal = null;
                hasMoved = false;
            }, { passive: true });

            container.addEventListener('touchmove', event => {
                if (!isDragging || event.touches.length !== 1) return;

                const touchX = event.touches[0].clientX;
                const touchY = event.touches[0].clientY;
                const diffX = touchX - startX;
                const diffY = touchY - startY;

                if (isHorizontal === null) {
                    if (Math.abs(diffX) > 8 || Math.abs(diffY) > 8) {
                        isHorizontal = Math.abs(diffX) > Math.abs(diffY);
                    }
                    if (!isHorizontal) {
                        isDragging = false;
                        return;
                    }
                }

                if (!isHorizontal) return;

                event.preventDefault();
                dx = diffX;
                hasMoved = true;

                const page = document.getElementById('calendarPage');
                if (page) {
                    const progress = dx / container.offsetWidth;
                    const rotate = progress * 3;
                    const scale = 1 - Math.abs(progress) * 0.03;
                    page.style.transition = 'none';
                    page.style.transform = `translateX(${dx}px) rotate(${rotate}deg) scale(${scale})`;
                    page.style.opacity = 1 - Math.abs(progress) * 0.15;
                }
            }, { passive: false });

            container.addEventListener('touchend', () => {
                if (!isDragging) return;
                isDragging = false;

                if (!hasMoved) return;

                const page = document.getElementById('calendarPage');
                const threshold = container.offsetWidth * 0.2;
                const absDx = Math.abs(dx);

                if (absDx > threshold) {
                    const dir = dx > 0 ? -1 : 1;
                    animating = true;
                    navigateCalendarSwipe(dir);
                    setTimeout(() => { animating = false; }, 400);
                } else if (absDx > 10) {
                    const dir = dx > 0 ? -1 : 1;
                    animating = true;
                    navigateCalendarSwipe(dir);
                    setTimeout(() => { animating = false; }, 400);
                } else {
                    if (page) {
                        page.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease';
                        page.style.transform = '';
                        page.style.opacity = '';
                        setTimeout(() => {
                            if (page) page.style.transition = '';
                        }, 300);
                    }
                }
                dx = 0;
            }, { passive: true });

            container.addEventListener('touchcancel', () => {
                isDragging = false;
                const page = document.getElementById('calendarPage');
                if (page) {
                    page.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                    page.style.transform = '';
                    page.style.opacity = '';
                    setTimeout(() => { if (page) page.style.transition = ''; }, 300);
                }
            }, { passive: true });
        }

        function attachVoiceHoldEvents(button) {
            let pointerId = null;
            let safetyTimer = null;
            const cleanupDocumentListeners = () => {
                document.removeEventListener('pointermove', move, true);
                document.removeEventListener('pointerup', finish, true);
                document.removeEventListener('pointercancel', finish, true);
                window.removeEventListener('blur', cancelFromWindow, true);
                if (safetyTimer) clearTimeout(safetyTimer);
                safetyTimer = null;
            };
            const start = event => {
                event.preventDefault();
                pointerId = event.pointerId;
                button.setPointerCapture?.(pointerId);
                state.voiceRecording = { active: true, cancel: false, startY: event.clientY };
                render();
                document.addEventListener('pointermove', move, true);
                document.addEventListener('pointerup', finish, true);
                document.addEventListener('pointercancel', finish, true);
                window.addEventListener('blur', cancelFromWindow, true);
                safetyTimer = setTimeout(() => {
                    if (!state.voiceRecording.active) return;
                    finish({ pointerId, preventDefault() {} });
                }, 60000);
                if (isAndroidApk() && window.BeckonStarsAndroid?.startVoiceRecording) {
                    window.BeckonStarsAndroid.startVoiceRecording();
                } else {
                    window.handleAndroidVoiceError('目前環境未支援 APK 錄音。請在 Android APK 內使用。');
                }
            };
            const move = event => {
                if (!state.voiceRecording.active || event.pointerId !== pointerId) return;
                const shouldCancel = state.voiceRecording.startY - event.clientY > 90;
                if (state.voiceRecording.cancel !== shouldCancel) {
                    state.voiceRecording.cancel = shouldCancel;
                    render();
                }
            };
            const finish = event => {
                if (!state.voiceRecording.active || event.pointerId !== pointerId) return;
                event.preventDefault();
                const shouldCancel = state.voiceRecording.cancel;
                cleanupDocumentListeners();
                try {
                    button.releasePointerCapture?.(pointerId);
                } catch (error) {}
                state.voiceRecording = { active: false, cancel: false, startY: 0 };
                render();
                if (isAndroidApk() && window.BeckonStarsAndroid?.finishVoiceRecording) {
                    window.BeckonStarsAndroid.finishVoiceRecording(shouldCancel);
                }
                pointerId = null;
            };
            const cancelFromWindow = () => {
                if (!state.voiceRecording.active) return;
                state.voiceRecording.cancel = true;
                finish({ pointerId, preventDefault() {} });
            };
            button.addEventListener('pointerdown', start);
        }

        window.handleAndroidVoiceRecording = async payload => {
            let recording = payload;
            if (typeof payload === 'string') {
                try {
                    recording = JSON.parse(payload);
                } catch (error) {
                    recording = {};
                }
            }
            if (!recording || recording.cancelled) return;

            const audio = recording.audio || '';
            const transcript = String(recording.transcript || '').trim();
            if (!audio) {
                showMessage('錄音失敗，請再試一次。');
                return;
            }
            state.showModal = null;
            render();
            await sendChatMessage({
                type: 'audio',
                content: transcript || '語音訊息',
                transcript,
                audio,
                audioMime: recording.audioMime || 'audio/mp4',
                audioDurationMs: recording.durationMs || 0,
                aiSummary: null
            });
        };

        window.handleAndroidVoiceError = message => {
            state.transcribingMessageId = null;
            render();
            showMessage(message || '語音識別失敗，請再試一次。');
        };

        window.handleAndroidVoiceTranscript = async payload => {
            let result = payload;
            if (typeof payload === 'string') {
                try {
                    result = JSON.parse(payload);
                } catch (error) {
                    result = {};
                }
            }

            const messageId = String(result?.messageId || '');
            const transcript = String(result?.transcript || '').trim();
            state.transcribingMessageId = null;

            if (!messageId || !transcript) {
                render();
                showMessage('接收端未能轉譯呢段錄音，可以播放錄音確認內容。');
                return;
            }

            try {
                await serverApi(`/api/families/${encodeURIComponent(state.familyId)}/messages/${encodeURIComponent(messageId)}/transcript`, {
                    method: 'POST',
                    body: JSON.stringify({ transcript })
                });
                await refreshServerMessages(state.familyId);
                showMessage('錄音已在本機轉成文字。');
            } catch (error) {
                console.warn('Voice transcript update failed', error);
                const message = state.messages.find(item => String(item.id) === messageId);
                if (message) {
                    message.transcript = transcript;
                    if (!message.content || message.content === '語音訊息') message.content = transcript;
                }
                render();
                showMessage('已轉譯，但回寫服務器失敗，請檢查連線。');
            }
        };

        async function transcribeVoiceMessage(messageId) {
            if (!messageId || state.backendMode !== 'server' || !state.familyId) return;
            const message = state.messages.find(item => String(item.id) === String(messageId));
            if (!message?.audio) {
                showMessage('呢條語音沒有可轉譯的錄音。');
                return;
            }

            state.transcribingMessageId = String(messageId);
            render();
            try {
                await serverApi(`/api/families/${encodeURIComponent(state.familyId)}/messages/${encodeURIComponent(messageId)}/transcribe`, {
                    method: 'POST',
                    body: JSON.stringify({})
                });
                await refreshServerMessages(state.familyId);
                showMessage('AI 已將錄音轉成文字。');
            } catch (error) {
                console.warn('Voice message transcription failed', error);
                showMessage('AI 轉譯錄音失敗，請稍後再試。');
            } finally {
                state.transcribingMessageId = null;
                render();
            }
        }

        async function summarizeVoiceMessage(messageId) {
            if (!messageId || state.backendMode !== 'server' || !state.familyId) return;
            render();
            try {
                await serverApi(`/api/families/${encodeURIComponent(state.familyId)}/messages/${encodeURIComponent(messageId)}/summarize`, {
                    method: 'POST',
                    body: JSON.stringify({})
                });
                await refreshServerMessages(state.familyId);
            } catch (error) {
                console.warn('Voice message summary failed', error);
                showMessage('總結錄音失敗，請稍後再試。');
            }
        }

        async function sendChatMessage(override = null) {
            const chatInput = document.getElementById('chatInput');
            const isTextMessage = !override;
            const content = override ? (override.content || '') : (chatInput?.value || chatDraft).trim();
            if (!content) return;
            if (isTextMessage) {
                chatDraft = '';
                shouldRestoreChatInputFocus = true;
            }

            const now = new Date();
            const message = {
                id: Date.now().toString(),
                uid: state.authUid || null,
                senderId: state.authUid,
                senderName: state.userName || '我',
                type: override?.type || 'text',
                content,
                img: override?.img || null,
                audio: override?.audio || null,
                audioMime: override?.audioMime || '',
                audioDurationMs: override?.audioDurationMs || 0,
                transcript: override?.transcript || '',
                aiSummary: override?.aiSummary || null,
                time: `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`,
                childId: state.role === 'child' ? 'child_1' : 'senior'
            };
            state.dailyMessages = Math.min(state.dailyMessages + 1, 5);
            state.points += 5;

            if (state.backendMode === 'server' && state.familyId) {
                if (chatInput) chatInput.value = '';
                state.isForwardingMessage = true;
                shouldStickChatToBottom = true;
                render();
                try {
                    await serverApi(`/api/families/${encodeURIComponent(state.familyId)}/messages`, {
                        method: 'POST',
                        body: JSON.stringify(message)
                    });
                    shouldStickChatToBottom = true;
                    await refreshServerMessages(state.familyId);
                } catch (error) {
                    console.warn('Server message send failed', error);
                    state.isForwardingMessage = false;
                    if (isTextMessage) {
                        chatDraft = content;
                        shouldRestoreChatInputFocus = true;
                    }
                    showMessage('訊息送出失敗，請檢查自架服務器。');
                    render();
                }
                return;
            }

            state.messages.push(message);
            state.isForwardingMessage = true;
            shouldStickChatToBottom = true;
            render();
            setTimeout(() => {
                const replies = state.role === 'child'
                    ? ['收到呀，記得食飯同早啲休息。', '好開心收到你訊息，得閒再打俾我啦。', '見到你分享我好放心，今晚等你。']
                    : ['收到，今晚返嚟陪你食飯。', '我睇到啦，等陣打俾你。', '多謝提醒，我會安排時間返嚟。'];
                addSystemReply(replies[Math.floor(Math.random() * replies.length)]);
            }, 900);
        }

        function addSystemReply(content) {
            const now = new Date();
            state.isForwardingMessage = false;
            state.messages.push({
                id: Date.now() + 1,
                senderId: state.role === 'child' ? 'senior' : 'child_1',
                senderName: state.role === 'child' ? '媽媽' : '大仔 (阿強)',
                type: 'text',
                content,
                time: `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`,
                childId: 'child_1'
            });
            render();
        }

        // 初始化渲染
        window.onload = async () => {
            registerPwa();
            updateNotificationPermission();
            loadDemoData();
            render(); // 先渲染，讓使用者看到畫面

            // 嘗試連接伺服器
            const connected = await initCloudBackend();
            console.log('[beckon] Server connection result:', connected, 'mode:', state.backendMode);

            // 載入今日黃曆
            fetchAlmanac().then(() => render());

            if (state.appReady && state.familyId && state.backendMode === 'server') {
                connectFamily(state.familyId, true).catch(error => {
                    console.warn('[beckon] Server family restore failed', error);
                }).finally(() => {
                    render(); // 連接完成後重新渲染
                });
            } else {
                render(); // 重新渲染以更新 backendMode 顯示
            }
        };

        window.addEventListener('beforeinstallprompt', event => {
            event.preventDefault();
            deferredInstallPrompt = event;
            state.canInstallApp = true;
            render();
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            state.canInstallApp = false;
            showMessage('已安裝星喚到手機主畫面。');
        });

    </script>

                    </div>
                `;
            }

            if (state.connectionMode === 'create') {
                if (!state.calendarCode) {
                    // 生成 6 位隨機數字
                    state.calendarCode = Math.floor(100000 + Math.random() * 900000).toString();
                }
                return `
                    <div class="flex flex-col h-full p-8 bg-[#FFF8F0] animate-fadeIn text-center">
                        <button class="action-btn self-start text-gray-400 mb-2 bs-text-xl" data-action="setConnectionMode" data-mode="select">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 class="bs-text-2xl font-bold text-gray-800 mb-6">您的日曆邀請碼</h2>
                        
                        <div class="bg-white p-8 rounded-3xl shadow-lg border border-orange-100 mb-8">
                            <p class="text-gray-500 mb-4">請將這組數字告訴您的家人</p>
                            <div class="text-6xl font-bold text-brand tracking-widest font-mono mb-4 bg-orange-50 py-4 rounded-xl">
                                ${state.calendarCode}
                            </div>
                            <button class="action-btn text-brand-dark font-bold py-2 px-4 rounded-full bg-orange-100 flex items-center justify-center mx-auto" data-action="copyCode">
                                <i class="fa-regular fa-copy mr-2"></i> 複製號碼
                            </button>
                        </div>

                        <div class="flex-1"></div>
                        <button class="action-btn w-full bg-brand text-white bs-text-xl font-bold py-4 rounded-2xl shadow-lg hover:bg-brand-dark transition-colors" data-action="finishOnboarding">
                            進入應用程式
                        </button>
                    </div>
                `;
            }

            if (state.connectionMode === 'join') {
                return `
                    <div class="flex flex-col h-full p-8 bg-[#FFF8F0] animate-fadeIn text-center">
                        <button class="action-btn self-start text-gray-400 mb-6 bs-text-xl" data-action="setConnectionMode" data-mode="select">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 class="bs-text-3xl font-bold text-gray-800 mb-2">輸入邀請碼</h2>
                        <p class="text-gray-500 mb-8">請輸入家人提供給您的6位數字</p>
                        
                        <div class="mb-8 relative">
                            <input type="number" id="joinCodeInput" placeholder="_ _ _ _ _ _" class="w-full text-center bs-text-4xl font-mono tracking-widest p-6 rounded-2xl border-2 ${state.errorMsg ? 'border-red-400' : 'border-gray-200'} focus:border-brand outline-none bg-white">
                            ${state.errorMsg ? `<p class="text-red-500 bs-text-sm mt-3 animate-shake">${state.errorMsg}</p>` : ''}
                        </div>

                        <div class="flex-1"></div>
                        <button class="action-btn w-full bg-brand text-white bs-text-xl font-bold py-4 rounded-2xl shadow-lg hover:bg-brand-dark transition-colors" data-action="submitJoinCode">
                            確認加入
                        </button>
                    </div>
                `;
            }
        }

        // --- 主應用程式視圖 ---

        // 頂部導航列 (加入一鍵刪除按鈕)
        function renderHeader() {
            const titles = { 'calendar': '日曆', 'chat': '對話', 'rewards': '獎勵', 'profile': '我' };
            const currentTitle = titles[state.currentTab] || '星喚';
            return `
                <header class="bg-white px-6 pt-12 pb-4 shadow-sm z-10 sticky top-0 flex justify-between items-center rounded-b-2xl">
                    <div class="flex items-center">
                        ${renderAvatar(state.userAvatar, { userId: state.authUid, sizeClass: 'w-10 h-10', coreClass: 'bg-orange-100 bs-text-2xl border-2 border-brand-light shadow-sm', extraClass: 'mr-3' })}
                        <h2 class="bs-text-2xl font-bold text-gray-800">${currentTitle}</h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="bg-orange-100 text-brand-dark px-3 py-1.5 rounded-full font-bold flex items-center shadow-inner">
                            <i class="fa-solid fa-coins mr-1.5 text-yellow-500"></i> ${state.points}
                        </div>
                        <button class="action-btn w-9 h-9 rounded-full ${state.notificationPermission === 'granted' ? 'bg-green-50 text-green-600' : 'bg-yellow-50 text-yellow-600'} flex items-center justify-center hover:bg-yellow-100 transition-colors" data-action="requestNotifications" title="開啟通知提示">
                            <i class="fa-solid ${state.notificationPermission === 'granted' ? 'fa-bell' : 'fa-bell-slash'}"></i>
                        </button>
                        ${state.canInstallApp ? `
                            <button class="action-btn w-9 h-9 rounded-full bg-orange-50 text-brand flex items-center justify-center hover:bg-orange-100 transition-colors" data-action="installApp" title="安裝成手機 App">
                                <i class="fa-solid fa-mobile-screen-button"></i>
                            </button>
                        ` : ''}
                        <button class="action-btn w-9 h-9 rounded-full bg-gray-900 text-green-300 flex items-center justify-center hover:bg-gray-800 transition-colors" data-action="openModal" data-modal="logs" title="查看 Log">
                            <i class="fa-solid fa-terminal"></i>
                        </button>
                        <button class="action-btn w-9 h-9 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition-colors" data-action="openModal" data-modal="confirmReset" title="清除數據並重新開始">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </header>
            `;
        }

        // 底部導航列
        function renderBottomNav() {
            const tabs = [
                { id: 'calendar', icon: 'fa-calendar-days', label: '日曆' },
                { id: 'chat', icon: 'fa-comments', label: '聊天' },
                { id: 'rewards', icon: 'fa-gift', label: '獎勵' },
                { id: 'profile', icon: 'fa-user', label: '我' }
            ];

            return `
                <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-6 pt-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))] flex justify-between items-center z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                    ${tabs.map(tab => `
                        <button class="action-btn flex flex-col items-center p-2 flex-1 ${state.currentTab === tab.id ? 'text-brand' : 'text-gray-400'}" data-action="switchTab" data-tab="${tab.id}">
                            <i class="fa-solid ${tab.icon} bs-text-2xl mb-1 transition-transform ${state.currentTab === tab.id ? 'transform scale-110' : ''}"></i>
                            <span class="bs-text-xs font-medium">${tab.label}</span>
                        </button>
                    `).join('')}
                </nav>
            `;
        }

        // 日曆視圖
        function renderCalendar() {
            let visibleMemories = state.memories;
            if (state.role === 'child') {
                visibleMemories = state.memories.filter(m => m.childId === 'child_1');
            }

            return `
                <div class="p-6" id="calendarContent">
                    <div class="flex bg-gray-200 rounded-xl p-1 mb-6">
                        <button class="action-btn flex-1 py-2 rounded-lg font-bold bs-text-sm transition-colors ${state.calendarMode === 'tear-off' ? 'bg-white text-brand shadow' : 'text-gray-500'}" data-action="switchCalendar" data-mode="tear-off">
                            手撕日曆
                        </button>
                        <button class="action-btn flex-1 py-2 rounded-lg font-bold bs-text-sm transition-colors ${state.calendarMode === 'monthly' ? 'bg-white text-brand shadow' : 'text-gray-500'}" data-action="switchCalendar" data-mode="monthly">
                            現時月曆
                        </button>
                    </div>

                    ${state.calendarMode === 'tear-off' ? renderTearOffCalendar(visibleMemories) : renderMonthlyCalendar(visibleMemories)}

                    <button class="action-btn mt-6 w-full bg-white border-2 border-orange-100 text-brand-dark py-4 rounded-2xl font-bold bs-text-lg shadow-sm flex items-center justify-center hover:bg-orange-50 transition-colors" data-action="openModal" data-modal="weeklySummary">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2 text-brand"></i> 生成家庭回憶摘要
                    </button>

                    <button class="action-btn mt-4 w-full bg-brand text-white py-4 rounded-2xl font-bold bs-text-lg shadow-lg flex items-center justify-center hover:bg-brand-dark transition-colors" data-action="openModal" data-modal="addMemory">
                        <i class="fa-solid fa-plus-circle mr-2 bs-text-xl"></i> 記錄今日回憶
                    </button>
                </div>
            `;
        }

        let calendarMotionLocked = false;
        let pendingCalendarContentUpdate = false;

        // 只更新日曆容器（不重建整個 DOM，避免閃爍）
        function updateCalendarContent() {
            if (calendarMotionLocked) {
                pendingCalendarContentUpdate = true;
                return;
            }

            let visibleMemories = state.memories;
            if (state.role === 'child') {
                visibleMemories = state.memories.filter(m => m.childId === 'child_1');
            }
            const calendarEl = document.getElementById('calendarContent');
            if (!calendarEl) return;

            // 保留切換按鈕和底部按鈕，只替換中間的日曆內容
            const tmp = document.createElement('div');
            tmp.innerHTML = state.calendarMode === 'tear-off'
                ? renderTearOffCalendar(visibleMemories)
                : renderMonthlyCalendar(visibleMemories);
            const newCalendar = tmp.firstElementChild;

            // 找到現有的日曆容器（切換按鈕之後的第一個子元素）
            const switcher = calendarEl.querySelector('.flex.bg-gray-200');
            if (switcher && switcher.nextElementSibling) {
                // 如果現有元素有 calendarPageContainer，保留其動畫狀態
                const oldContainer = switcher.nextElementSibling;
                calendarEl.replaceChild(newCalendar, oldContainer);
            }

            // 重新綁定日曆區塊的事件
            calendarEl.querySelectorAll('.calendar-nav-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    event.stopPropagation();
                    navigateCalendarMonth(parseInt(btn.getAttribute('data-calendar-dir')));
                });
            });
            setupCalendarSwipe();
        }

        // 手撕日曆 - 產生某一天的頁面 HTML（不含容器）
        function tearOffPageHtml(displayDay, displayYear, displayMonth, memories) {
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const displayDate = new Date(displayYear, displayMonth - 1, displayDay);
            const isCurrentMonth = displayYear === today.getFullYear() && displayMonth === today.getMonth() + 1;
            const isToday = isCurrentMonth && displayDay === today.getDate();
            const dayMemories = memories.filter(m => m.date === displayDay && m.month === displayMonth);
            const dateKey = getDisplayedDateKey(displayYear, displayMonth, displayDay);
            const almanac = almanacCache[dateKey] || null;
            const bibleVerse = bibleVerseCache[dateKey] || null;
            const hasAlmanac = almanac && almanac.ok;
            const hasBibleVerse = bibleVerse && bibleVerse.ok;

            // 農曆日期顯示
            let subDateDisplay = '';
            if (state.dailyCardMode === 'almanac' && hasAlmanac) {
                const lunar = almanac.lunar;
                subDateDisplay = `<p class="bs-text-xs text-gray-400 mt-1">${lunar.dayGanZhi}日 · 農曆${lunar.month}月${lunar.day}${lunar.jieQi ? ' · ' + lunar.jieQi : ''}</p>`;
            } else if (state.dailyCardMode === 'bible') {
                subDateDisplay = `<p class="bs-text-xs text-gray-400 mt-1">${isToday ? '今日' : `${displayMonth}月${displayDay}日`} · 聖經金句</p>`;
            }

            let dailyCardHtml = '';
            if (state.dailyCardMode === 'bible') {
                if (hasBibleVerse) {
                    dailyCardHtml = `
                        <div class="bg-[#FFF8F0] border border-amber-200 rounded-xl p-4 pb-7 shadow-sm inline-block text-left relative max-w-full">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded bs-text-sm font-bold">${isToday ? '今日金句' : '金句'}</span>
                                <span class="text-gray-500 bs-text-xs font-medium">${escapeHtml(bibleVerse.reference || '')}</span>
                            </div>
                            <p class="text-gray-700 font-medium leading-relaxed">${escapeHtml(bibleVerse.text || '')}</p>
                            <p class="absolute right-3 bottom-2 text-[3px] text-gray-400 tracking-wide uppercase">FROM ${escapeHtml(bibleVerse.source || '信望愛站聖經')}</p>
                        </div>
                    `;
                }
            } else if (hasAlmanac) {
                dailyCardHtml = `
                    <div class="bg-[#FFF8F0] border border-orange-200 rounded-xl p-4 pb-7 shadow-sm inline-block text-left relative max-w-full">
                        <div class="mb-2">
                            <span class="bg-orange-100 text-brand-dark px-2 py-1 rounded bs-text-sm font-bold mr-2">${isToday ? '今日宜' : '宜'}</span>
                            <span class="text-gray-700 font-medium">${escapeHtml(almanac.yiDisplay)}</span>
                        </div>
                        <div>
                            <span class="bg-red-50 text-red-600 px-2 py-1 rounded bs-text-sm font-bold mr-2">忌</span>
                            <span class="text-gray-500 font-medium">${escapeHtml(almanac.jiDisplay)}</span>
                        </div>
                        <p class="bs-text-xs text-gray-400 mt-2">${escapeHtml(almanac.lunar.pengZu)} · ${escapeHtml(almanac.lunar.xiu)}宿${almanac.lunar.xiuLuck ? ' · ' + escapeHtml(almanac.lunar.xiuLuck) : ''}</p>
                        <p class="absolute right-3 bottom-2 text-[3px] text-gray-400 tracking-wide uppercase">FROM 6tail.cn</p>
                    </div>
                `;
            }

            return `
                <div class="p-8 text-center relative tear-off-bg">
                    <h3 class="bs-text-2xl font-medium text-gray-500 mb-2">${dayNames[displayDate.getDay()]}</h3>
                    <h1 class="text-8xl font-bold text-gray-800 mb-2 font-serif">${displayDay}</h1>
                    ${subDateDisplay}
                    <div class="mt-4">${dailyCardHtml}</div>
                </div>
                ${dayMemories.length > 0 ? `
                    <div class="bg-orange-50 p-4 border-t border-orange-100">
                        <p class="bs-text-sm font-bold text-brand-dark mb-2"><i class="fa-solid fa-heart"></i> ${displayDay}日已有 ${dayMemories.length} 個回憶</p>
                        <div class="flex gap-2 overflow-x-auto no-scrollbar">
                            ${dayMemories.map(m => `
                                <div class="w-12 h-12 rounded-lg bg-white border border-orange-200 flex-shrink-0 flex items-center justify-center overflow-hidden">
                                    ${m.img ? `<img src="${m.img}" class="w-full h-full object-cover">` : `<i class="fa-solid ${m.type === 'audio' ? 'fa-microphone text-blue-400' : 'fa-font text-gray-400'} bs-text-xl"></i>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
        }

        // 手撕日曆
        function renderTearOffCalendar(memories) {
            const daysInMonth = new Date(state.calendarYear, state.calendarMonth, 0).getDate();
            const displayDay = Math.min(state.calendarDay || today.getDate(), daysInMonth);
            const isCurrentMonth = state.calendarYear === today.getFullYear() && state.calendarMonth === today.getMonth() + 1;
            const prevDate = getShiftedCalendarDate(state.calendarYear, state.calendarMonth, displayDay, -1);
            const nextDate = getShiftedCalendarDate(state.calendarYear, state.calendarMonth, displayDay, 1);
            prefetchDailyCardWindow(state.calendarYear, state.calendarMonth, displayDay);

            return `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-2 border-gray-100 relative" id="tearOffCalendar">
                    <div class="bg-brand-red text-white py-3 px-6 flex justify-between items-center">
                        <button class="calendar-nav-btn text-white/80 hover:text-white bs-text-lg px-2" data-calendar-dir="-1"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="bs-text-xl font-bold">${state.calendarYear}年 ${state.calendarMonth}月</span>
                        <button class="calendar-nav-btn text-white/80 hover:text-white bs-text-lg px-2" data-calendar-dir="1"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <div class="calendar-page-container overflow-hidden relative" id="calendarPageContainer">
                        <div class="calendar-page calendar-page-adjacent" data-calendar-preview="-1" aria-hidden="true" style="transform: translate3d(-100%, 0, 0);">
                            ${tearOffPageHtml(prevDate.day, prevDate.year, prevDate.month, memories)}
                        </div>
                        <div class="calendar-page" id="calendarPage">
                            ${tearOffPageHtml(displayDay, state.calendarYear, state.calendarMonth, memories)}
                        </div>
                        <div class="calendar-page calendar-page-adjacent" data-calendar-preview="1" aria-hidden="true" style="transform: translate3d(100%, 0, 0);">
                            ${tearOffPageHtml(nextDate.day, nextDate.year, nextDate.month, memories)}
                        </div>
                    </div>
                </div>
            `;
        }

        // 月曆 - 產生某個月的頁面 HTML（不含容器）
        function monthlyPageHtml(calYear, calMonth, memories) {
            const daysInMonth = new Date(calYear, calMonth, 0).getDate();
            const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
            const isCurrentMonth = calYear === today.getFullYear() && calMonth === today.getMonth() + 1;
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            let gridHtml = dayNames.map(d => `<div class="text-center bs-text-sm font-bold text-gray-400 py-2">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) gridHtml += `<div></div>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const isToday = isCurrentMonth && i === today.getDate();
                const dayMemories = memories.filter(m => m.date === i && m.month === calMonth);
                const hasMemory = dayMemories.length > 0;
                gridHtml += `
                    <div class="aspect-square flex items-center justify-center p-1 relative">
                        <button class="action-btn w-full h-full rounded-xl flex items-center justify-center font-medium bs-text-lg transition-all ${isToday ? 'bg-brand text-white shadow-md' : 'bg-gray-50 text-gray-700 hover:bg-orange-100'} ${hasMemory && !isToday ? 'border-2 border-brand-light' : ''}"
                                ${hasMemory ? `data-action="viewMemories" data-date="${i}" data-month="${calMonth}"` : ''}>
                            ${i}
                        </button>
                        ${hasMemory ? `<div class="absolute top-2 right-2 w-2 h-2 bg-brand-red rounded-full shadow-sm"></div>` : ''}
                    </div>
                `;
            }

            return `
                <div class="flex justify-between items-center mb-4">
                    <button class="calendar-nav-btn text-gray-400 hover:text-brand transition-colors p-2" data-calendar-dir="-1"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 class="bs-text-xl font-bold text-gray-800">${calYear}年 ${calMonth}月</h3>
                    <button class="calendar-nav-btn text-gray-400 hover:text-brand transition-colors p-2" data-calendar-dir="1"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-2 mb-6">
                    ${gridHtml}
                </div>
            `;
        }

        // 月曆
        function renderMonthlyCalendar(memories) {
            const calYear = state.calendarYear;
            const calMonth = state.calendarMonth;
            const prevMonth = getShiftedCalendarMonth(calYear, calMonth, -1);
            const nextMonth = getShiftedCalendarMonth(calYear, calMonth, 1);

            return `
                <div class="bg-white rounded-3xl shadow-lg p-5 border border-gray-100 relative" id="monthlyCalendar">
                    <div class="calendar-page-container overflow-hidden relative" id="calendarPageContainer">
                        <div class="calendar-page calendar-page-adjacent" data-calendar-preview="-1" aria-hidden="true" style="transform: translate3d(-100%, 0, 0);">
                            ${monthlyPageHtml(prevMonth.year, prevMonth.month, memories)}
                        </div>
                        <div class="calendar-page" id="calendarPage">
                            ${monthlyPageHtml(calYear, calMonth, memories)}
                        </div>
                        <div class="calendar-page calendar-page-adjacent" data-calendar-preview="1" aria-hidden="true" style="transform: translate3d(100%, 0, 0);">
                            ${monthlyPageHtml(nextMonth.year, nextMonth.month, memories)}
                        </div>
                    </div>

                    <button class="action-btn w-full bg-gradient-to-r from-orange-400 to-brand-dark text-white rounded-xl p-4 flex items-center justify-between shadow-md mt-4" data-action="openModal" data-modal="videoPlayer">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-white/30 rounded-full flex items-center justify-center mr-3 backdrop-blur-sm">
                                <i class="fa-solid fa-play text-white"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold bs-text-lg">本月回憶影片</p>
                                <p class="bs-text-xs text-orange-100">為您集合這個月的溫暖時刻</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-white/70"></i>
                    </button>
                </div>
            `;
        }

        // 聊天視圖
        function renderVoiceRecordingBar() {
            const recording = state.voiceRecording || createIdleVoiceRecordingState();
            const elapsed = formatRecordingElapsed(recording.elapsedMs);
            const isCancelling = recording.cancel || recording.gesture === 'cancel';
            const isLocking = recording.gesture === 'lock';

            if (recording.locked) {
                return `
                    <div id="chatComposerBar" class="shrink-0 bg-white px-3 py-3 border-t border-gray-100 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] flex items-center gap-3">
                        <button class="action-btn w-12 h-12 rounded-full bg-red-100 text-brand-red flex items-center justify-center shrink-0 shadow-sm hover:bg-red-200 transition-colors" data-action="deleteLockedVoiceRecording" title="刪除錄音">
                            <i class="fa-solid fa-trash bs-text-lg"></i>
                        </button>
                        <div class="min-w-0 flex-1 flex items-center gap-3 bg-gray-50 rounded-2xl px-4 py-3">
                            <span class="w-3 h-3 rounded-full bg-brand-red recording-pulse shrink-0"></span>
                            <div class="min-w-0 flex-1">
                                <p id="voiceRecordingLockedTimerText" class="font-bold text-gray-800 bs-text-base leading-tight">${elapsed}</p>
                                <p class="bs-text-xs text-gray-500 mt-0.5">已鎖定，正在錄音</p>
                            </div>
                            <i class="fa-solid fa-lock text-brand"></i>
                        </div>
                        <button class="action-btn w-12 h-12 rounded-full bg-brand text-white flex items-center justify-center shrink-0 shadow-md hover:bg-brand-dark transition-colors" data-action="sendLockedVoiceRecording" title="傳送錄音">
                            <i class="fa-solid fa-paper-plane bs-text-xl"></i>
                        </button>
                    </div>
                `;
            }

            if (recording.active) {
                return `
                    <div id="chatComposerBar" class="shrink-0 bg-white px-3 py-3 border-t border-gray-100 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
                        <div class="flex items-center gap-3">
                            <button id="voiceHoldButton" class="w-12 h-12 rounded-full ${isCancelling ? 'bg-red-100 text-brand-red' : 'bg-brand text-white'} flex items-center justify-center shrink-0 select-none touch-none shadow-md ${isCancelling ? '' : 'recording-pulse'}" title="按住錄音">
                                <i class="fa-solid ${isCancelling ? 'fa-ban' : 'fa-microphone'} bs-text-xl"></i>
                            </button>
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center justify-between gap-3">
                                    <div class="min-w-0 flex-1 flex items-center gap-2 ${isCancelling ? 'text-brand-red' : 'text-gray-500'} font-bold bs-text-sm">
                                        ${isCancelling ? '<i class="fa-solid fa-ban"></i><span>鬆手取消錄音</span>' : '<span>向右滑取消</span><i class="fa-solid fa-arrow-right-long"></i>'}
                                    </div>
                                    <div class="flex items-center gap-2 text-gray-800 font-bold bs-text-base shrink-0">
                                        <span class="w-2.5 h-2.5 rounded-full bg-brand-red recording-pulse"></span>
                                        <span id="voiceRecordingTimerText">${elapsed}</span>
                                    </div>

        // 當需要只更新底部錄音列時呼叫，避免全頁 render
        function replaceVoiceRecordingBar() {
            const composer = document.getElementById('chatComposerBar');
            if (composer) {
                const oldInput = document.getElementById('chatInput');
                if (oldInput) chatDraft = oldInput.value;

                composer.outerHTML = renderVoiceRecordingBar();

                // 重新綁定新按鈕的指針事件與其他事件
                const newBtn = document.getElementById('voiceHoldButton');
                if (newBtn && !state.voiceRecording.locked && state.voiceRecording.active) {
                    // 如果依然在 active 且非 locked 狀態（這通常表示還在 pointermove），
                    // 不要透過 attachVoiceHoldEvents 重新覆蓋 start/move/finish，
                    // 否則會遺失外層作用域中正在綁定的 pointerId。
                    // 因此針對「滑動更新 UI」的情境，新按鈕直接接續即可。
                } else if (newBtn && !state.voiceRecording.locked) {
                    attachVoiceHoldEvents(newBtn);
                }
                const newInput = document.getElementById('chatInput');
                if (newInput) {
                    newInput.addEventListener('input', event => chatDraft = event.target.value);
                    newInput.addEventListener('keydown', event => {
                        if (event.key === 'Enter') {
                            event.preventDefault();
                            sendChatMessage();
                        }
                    });
                }
                // 將新 action buttons 綁定中央 handler
                document.querySelectorAll('#chatComposerBar .action-btn').forEach(btn => {
                    btn.addEventListener('click', async event => {
                        event.preventDefault();
                        const action = btn.getAttribute('data-action');
                        if (action === 'sendMessage') sendChatMessage();
                        else if (action === 'sendLockedVoiceRecording') finishLockedVoiceRecording(false);
                        else if (action === 'deleteLockedVoiceRecording') finishLockedVoiceRecording(true);
                        else if (action === 'selectChatImage') document.getElementById('chatImageInput')?.click();
                    });
                });
                const chatImageInput = document.getElementById('chatImageInput');
                if (chatImageInput) {
                    chatImageInput.addEventListener('change', async event => {
                        const file = event.target.files?.[0];
                        if (!file) return;
                        event.target.value = '';
                        if (state.backendMode === 'server') {
                            try {
                                const uploaded = await uploadMediaFile(file);
                                await sendChatMessage({ type: 'photo', content: '', imgUrl: uploaded.mediaUrl, thumbnailUrl: uploaded.thumbnailUrl });
                            } catch (err) {
                                console.warn('Image upload failed, using base64', err);
                                const img = await readFileAsDataUrl(file);
                                await sendChatMessage({ type: 'photo', content: '', img });
                            }
                        } else {
                            const img = await readFileAsDataUrl(file);
                            await sendChatMessage({ type: 'photo', content: '', img });
                        }
                    });
                }
            } else {
                render();
            }
        }

                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-right-from-bracket bs-text-2xl text-red-500"></i>
                        </div>
                        <h3 class="bs-text-xl font-bold text-gray-800 mb-2">確認登出？</h3>
                        <p class="text-gray-500 bs-text-sm mb-6">登出後需要重新輸入電郵和密碼登入</p>
                        <div class="flex gap-3">
                            <button class="action-btn flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-2xl hover:bg-gray-200 transition-colors" data-action="closeModal">取消</button>
                            <button class="action-btn flex-1 bg-red-500 text-white font-bold py-3 rounded-2xl shadow-md hover:bg-red-600 transition-colors" data-action="confirmLogout">登出</button>
                        </div>
                    </div>
                `;
            }

            // 退出家庭確認
            if (state.showModal === 'confirmLeaveFamily') {
                modalContent = `
                    <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center relative animate-fadeIn">
                        <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-right-from-bracket bs-text-2xl text-orange-500"></i>
                        </div>
                        <h3 class="bs-text-xl font-bold text-gray-800 mb-2">確認退出家庭？</h3>
                        <p class="text-gray-500 bs-text-sm mb-6">退出後你可以加入其他家庭，此家庭的訊息和回憶會保留</p>
                        <div class="flex gap-3">
                            <button class="action-btn flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-2xl hover:bg-gray-200 transition-colors" data-action="closeModal">取消</button>
                            <button class="action-btn flex-1 bg-orange-500 text-white font-bold py-3 rounded-2xl shadow-md hover:bg-orange-600 transition-colors" data-action="confirmLeaveFamily">退出</button>
                        </div>
                    </div>
                `;
            }

            // 編輯個人資料
            if (state.showModal === 'editProfile') {
                const avatarOptions = state.role === 'senior' ? avatars.senior : avatars.child;
                const currentAvatar = state.userAvatar || '👤';
                const isCustomImage = currentAvatar.startsWith('data:') || currentAvatar.startsWith('http');
                modalContent = `
                    <div class="bg-white w-full max-w-md rounded-3xl p-6 relative animate-fadeIn max-h-[85vh] overflow-y-auto">
                        <button class="action-btn absolute top-4 right-4 w-8 h-8 bg-gray-100 rounded-full text-gray-500 flex items-center justify-center" data-action="closeModal">
                            <i class="fa-solid fa-times"></i>
                        </button>
                        <h2 class="bs-text-xl font-bold text-gray-800 mb-6">編輯個人資料</h2>

                        <!-- 頭像 -->
                        <div class="text-center mb-4">
                            <div class="w-20 h-20 mx-auto rounded-full bg-orange-100 flex items-center justify-center overflow-hidden border-4 border-orange-200 mb-2" id="editAvatarPreview">
                                ${isCustomImage ? `<img src="${currentAvatar}" class="w-full h-full object-cover" id="editAvatarImg">` : `<span class="bs-text-4xl" id="editAvatarEmoji">${currentAvatar}</span>`}
                            </div>
                            <button class="action-btn bs-text-sm text-brand font-medium" data-action="uploadAvatar">
                                <i class="fa-solid fa-camera mr-1"></i>上傳照片
                            </button>
                            <input type="file" id="avatarFileInput" accept="image/*" class="hidden">
                        </div>

                        <!-- Emoji 頭像選擇 -->
                        <p class="bs-text-sm text-gray-500 mb-2">或選擇 Emoji：</p>
                        <div class="grid grid-cols-6 gap-2 mb-4">
                            ${avatarOptions.map(a => `
                                <button class="action-btn bs-text-2xl p-2 rounded-xl transition-all ${!isCustomImage && currentAvatar === a ? 'bg-brand shadow-md scale-105' : 'bg-gray-50 border border-gray-200 opacity-60'}" data-action="editSelectAvatar" data-avatar="${a}">${a}</button>
                            `).join('')}
                        </div>

                        <!-- 名稱 -->
                        <div class="mb-6">
                            <label class="bs-text-sm text-gray-500 mb-1 block">名稱</label>
                            <input id="editNameInput" type="text" value="${state.userName || ''}" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" placeholder="輸入您的稱呼">
                        </div>

                        ${state.errorMsg ? `<p class="text-red-500 bs-text-sm mb-4 text-center animate-shake">${state.errorMsg}</p>` : ''}

                        <button class="action-btn w-full bg-brand text-white font-bold py-3 rounded-2xl shadow-md hover:bg-brand-dark transition-colors" data-action="saveProfile">
                            儲存
                        </button>
                    </div>
                `;
            }

            // 修改密碼
            if (state.showModal === 'changePassword') {
                modalContent = `
                    <div class="bg-white w-full max-w-md rounded-3xl p-6 relative animate-fadeIn">
                        <button class="action-btn absolute top-4 right-4 w-8 h-8 bg-gray-100 rounded-full text-gray-500 flex items-center justify-center" data-action="closeModal">
                            <i class="fa-solid fa-times"></i>
                        </button>
                        <h2 class="bs-text-xl font-bold text-gray-800 mb-6">修改密碼</h2>

                        <div class="space-y-4 mb-6">
                            <div>
                                <label class="bs-text-sm text-gray-500 mb-1 block">舊密碼</label>
                                <input id="oldPasswordInput" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" placeholder="輸入舊密碼" autocomplete="current-password">
                            </div>
                            <div>
                                <label class="bs-text-sm text-gray-500 mb-1 block">新密碼</label>
                                <input id="newPasswordInput" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" placeholder="至少 6 個字元" autocomplete="new-password">
                            </div>
                            <div>
                                <label class="bs-text-sm text-gray-500 mb-1 block">確認新密碼</label>
                                <input id="confirmPasswordInput" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" placeholder="再次輸入新密碼" autocomplete="new-password">
                            </div>
                        </div>

                        ${state.errorMsg ? `<p class="text-red-500 bs-text-sm mb-4 text-center animate-shake">${state.errorMsg}</p>` : ''}

                        <button class="action-btn w-full bg-brand text-white font-bold py-3 rounded-2xl shadow-md hover:bg-brand-dark transition-colors" data-action="savePassword">
                            確認修改
                        </button>
                    </div>
                `;
            }

            // 更新提示
            if (state.showModal === 'updateAvailable') {
                const info = state.updateInfo || {};
                modalContent = `
                    <div class="bg-white w-[80%] max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-fadeIn">
                        <div class="w-16 h-16 bg-brand-light text-brand rounded-full flex items-center justify-center bs-text-3xl mx-auto mb-4">
                            <i class="fa-solid fa-arrow-up"></i>
                        </div>
                        <h3 class="bs-text-xl font-bold text-gray-800 mb-2">有新版本 ${escapeHtml(info.versionName || '')}</h3>
                        ${info.releaseNotes ? `<p class="text-gray-500 bs-text-sm mb-4 text-left max-h-32 overflow-y-auto whitespace-pre-line">${escapeHtml(info.releaseNotes)}</p>` : ''}
                        <div class="flex gap-3">
                            <button class="action-btn flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-colors" data-action="closeModal">稍後再說</button>
                            <button class="action-btn flex-1 py-3 bg-brand text-white font-bold rounded-xl shadow-md hover:bg-brand-dark transition-colors" data-action="downloadUpdate">立即更新</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="absolute inset-0 z-50 flex items-${state.showModal === 'addMemory' ? 'end' : 'center'} justify-center bg-black/40 backdrop-blur-sm">
                    ${modalContent}
                </div>
            `;
        }

        // --- 顯示自訂訊息框 ---
        function showMessage(text) {
            state.modalMessage = text;
            state.showModal = 'messageBox';
            render();
        }

        window.handleAndroidImageSaveResult = function(success, message) {
            showMessage(message || (success ? '✅ 圖片已保存到手機相簿。' : '圖片保存失敗，請稍後再試。'));
        };

        // --- 事件處理 ---
        function attachEvents() {
            const buttons = document.querySelectorAll('.action-btn');
            buttons.forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', async event => {
                    event.preventDefault();
                    const action = newBtn.getAttribute('data-action');
                    state.errorMsg = ''; // 重置錯誤訊息
                    
                    // 刪除與重置數據
                    if (action === 'resetData') {
                        resetDemoData();
                        render();
                        setTimeout(() => showMessage('所有數據已清除，請重新設定。'), 100);
                        return;
                    }

                    // Onboarding 操作
                    if (action === 'switchAuthMode') {
                        state.authMode = newBtn.getAttribute('data-mode');
                        state.errorMsg = '';
                        render();
                    }
                    else if (action === 'login') {
                        handleLogin();
                    }
                    else if (action === 'register') {
                        handleRegister();
                    }
                    else if (action === 'androidGoogleLogin') {
                        startAndroidGoogleLogin();
                    }
                    else if (action === 'setRole') {
                        state.role = newBtn.getAttribute('data-role');
                        localStorage.setItem('beckon-stars-role', state.role);
                        state.seniorMode = state.role === 'senior';
                        localStorage.setItem('beckon-stars-senior-mode', state.seniorMode);
                        document.body.classList.toggle('senior-mode', state.seniorMode);
                        applySeniorModeVars();
                        state.userAvatar = null; // 重置頭像確保切換角色時重新賦予預設值
                        state.onboardingStep = 3;
                        render();
                    } 
                    else if (action === 'backStep') {
                        state.onboardingStep = parseInt(newBtn.getAttribute('data-step'));
                        render();
                    }
                    else if (action === 'selectAvatar') {
                        state.userAvatar = newBtn.getAttribute('data-avatar');
                        // 保留輸入框的值
                        const nameInput = document.getElementById('nameInput');
                        if (nameInput) state.userName = nameInput.value;
                        render();
                    }
                    else if (action === 'submitProfile') {
                        const nameInput = document.getElementById('nameInput');
                        if (!nameInput.value.trim()) {
                            state.errorMsg = '請輸入您的稱呼！';
                            render();
                            return;
                        }
                        state.userName = nameInput.value.trim();
                        state.onboardingStep = 4;
                        render();
                    }
                    else if (action === 'setConnectionMode') {
                        state.connectionMode = newBtn.getAttribute('data-mode');
                        render();
                    }
                    else if (action === 'copyCode' || action === 'copyFamilyCode') {
                        navigator.clipboard?.writeText(state.calendarCode || '').catch(() => {});
                        showMessage('已複製邀請碼！分享給家人吧。');
                    }
                    else if (action === 'submitJoinCode') {
                        const joinCodeInput = document.getElementById('joinCodeInput');
                        if (!joinCodeInput.value || joinCodeInput.value.length !== 6) {
                            state.errorMsg = '請輸入正確的6位數字邀請碼！';
                            render();
                            return;
                        }
                        try {
                            await connectFamily(joinCodeInput.value, false);
                            state.appReady = true;
                            render();
                            setTimeout(() => showMessage('成功加入同步家庭日曆！'), 500);
                        } catch (error) {
                            if (error.message === 'unauthorized') {
                                state.errorMsg = '登入已過期，請重新登入。';
                                state.onboardingStep = 1;
                                signOut();
                            } else {
                                state.errorMsg = error.message === 'family-not-found' ? '找不到這個家庭碼，請確認家人已建立。' : '加入失敗，請稍後再試。';
                            }
                            render();
                        }
                    }
                    else if (action === 'finishOnboarding') {
                        if (!state.calendarCode) state.calendarCode = Math.floor(100000 + Math.random() * 900000).toString();
                        try {
                            await connectFamily(state.calendarCode, true);
                            state.appReady = true;
                            render();
                            setTimeout(() => showMessage(`已建立同步家庭日曆！邀請碼是 ${state.calendarCode}。`), 500);
                        } catch (error) {
                            if (error.message === 'unauthorized') {
                                state.errorMsg = '登入已過期，請重新登入。';
                                state.onboardingStep = 1;
                                signOut();
                            } else {
                                state.errorMsg = '建立家庭失敗，請稍後再試。';
                            }
                            render();
                        }
                    }
                    // 個人資料操作
                    else if (action === 'toggleSeniorMode') {
                        state.seniorMode = !state.seniorMode;
                        localStorage.setItem('beckon-stars-senior-mode', state.seniorMode);
                        document.body.classList.toggle('senior-mode', state.seniorMode);
                        applySeniorModeVars();
                        render();
                    }
                    else if (action === 'toggleDailyCardMode') {
                        state.dailyCardMode = state.dailyCardMode === 'bible' ? 'almanac' : 'bible';
                        localStorage.setItem(DAILY_CARD_MODE_KEY, state.dailyCardMode);
                        prefetchDailyCardWindow();
                        if (state.dailyCardMode === 'bible') {
                            showMessage('手撕日曆已切換為聖經金句。');
                        } else {
                            showMessage('手撕日曆已切換為黃曆宜忌。');
                        }
                        render();
                    }
                    else if (action === 'logout') {
                        state.showModal = 'confirmLogout';
                        render();
                    }
                    else if (action === 'confirmLogout') {
                        state.appReady = false;
                        state.onboardingStep = 1;
                        state.showModal = null;
                        signOut();
                        render();
                    }
                    else if (action === 'leaveFamily') {
                        state.showModal = 'confirmLeaveFamily';
                        render();
                    }
                    else if (action === 'confirmLeaveFamily') {
                        if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
                        if (unsubscribeMemories) { unsubscribeMemories(); unsubscribeMemories = null; }
                        const oldFamilyId = state.familyId;
                        serverApi(`/api/families/${encodeURIComponent(oldFamilyId)}/leave`, { method: 'DELETE' })
                            .then(() => {
                                state.familyId = null;
                                state.calendarCode = null;
                                state.messages = [];
                                state.memories = [];
                                state.showModal = null;
                                state.appReady = false;
                                state.onboardingStep = 4;
                                state.connectionMode = 'select';
                                if (state.currentUser?.families) {
                                    state.currentUser.families = state.currentUser.families.filter(f => f !== oldFamilyId);
                                }
                                saveDemoData();
                                render();
                                showMessage('已退出家庭，請選擇加入或建立新家庭');
                            })
                            .catch(err => {
                                console.error('退出家庭失敗', err);
                                showMessage('退出失敗，請稍後再試');
                                state.showModal = null;
                                render();
                            });
                    }
                    else if (action === 'downloadUpdate') {
                        if (window.BeckonStarsAndroid?.downloadAndInstallUpdate) {
                            window.BeckonStarsAndroid.downloadAndInstallUpdate(state.updateInfo.downloadUrl);
                            state.showModal = null;
                            render();
                            showMessage('正在下載更新，完成後會自動提示安裝');
                        } else {
                            window.open(state.updateInfo.downloadUrl, '_blank');
                            state.showModal = null;
                            render();
                        }
                    }
                    else if (action === 'uploadAvatar') {
                        const fileInput = document.getElementById('avatarFileInput');
                        if (fileInput) fileInput.click();
                    }
                    else if (action === 'editSelectAvatar') {
                        state.userAvatar = newBtn.getAttribute('data-avatar');
                        const preview = document.getElementById('editAvatarPreview');
                        if (preview) preview.innerHTML = `<span class="bs-text-4xl">${state.userAvatar}</span>`;
                        // 更新按鈕選中狀態
                        document.querySelectorAll('[data-action="editSelectAvatar"]').forEach(b => {
                            const isSelected = b.getAttribute('data-avatar') === state.userAvatar;
                            b.className = `action-btn bs-text-2xl p-2 rounded-xl transition-all ${isSelected ? 'bg-brand shadow-md scale-105' : 'bg-gray-50 border border-gray-200 opacity-60'}`;
                        });
                    }
                    else if (action === 'saveProfile') {
                        const nameInput = document.getElementById('editNameInput');
                        const newName = nameInput ? nameInput.value.trim() : '';
                        if (!newName) {
                            state.errorMsg = '名稱不能為空';
                            render();
                            return;
                        }
                        try {
                            const result = await serverApi('/api/auth/profile', {
                                method: 'PUT',
                                body: JSON.stringify({ name: newName, avatar: state.userAvatar })
                            });
                            state.userName = result.user.name;
                            state.userAvatar = result.user.picture || state.userAvatar;
                            state.currentUser = result.user;
                            localStorage.setItem('beckon-stars-user', JSON.stringify(result.user));
                            state.showModal = null;
                            render();
                            showMessage('個人資料已更新！');
                        } catch (error) {
                            state.errorMsg = '更新失敗，請稍後再試';
                            render();
                        }
                    }
                    else if (action === 'savePassword') {
                        const oldPwd = document.getElementById('oldPasswordInput')?.value || '';
                        const newPwd = document.getElementById('newPasswordInput')?.value || '';
                        const confirmPwd = document.getElementById('confirmPasswordInput')?.value || '';
                        if (!oldPwd || !newPwd || !confirmPwd) {
                            state.errorMsg = '請填寫所有欄位';
                            render();
                            return;
                        }
                        if (newPwd.length < 6) {
                            state.errorMsg = '新密碼長度至少 6 個字元';
                            render();
                            return;
                        }
                        if (newPwd !== confirmPwd) {
                            state.errorMsg = '兩次輸入的新密碼不一致';
                            render();
                            return;
                        }
                        try {
                            await serverApi('/api/auth/password', {
                                method: 'PUT',
                                body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
                            });
                            state.showModal = null;
                            render();
                            showMessage('密碼已成功修改！');
                        } catch (error) {
                            if (error.status === 401) {
                                state.errorMsg = '舊密碼不正確';
                            } else {
                                state.errorMsg = error.serverMessage || '修改失敗，請稍後再試';
                            }
                            render();
                        }
                    }
                    // 主應用程式操作
                    else if (action === 'switchTab') {
                        state.currentTab = newBtn.getAttribute('data-tab');
                        if (state.currentTab === 'chat') shouldStickChatToBottom = true;
                        render();
                        if (state.backendMode === 'server' && state.familyId && state.currentTab === 'calendar') {
                            refreshServerMemories(state.familyId).catch(() => {});
                        }
                        if (state.backendMode === 'server' && state.familyId && state.currentTab === 'chat') {
                            refreshServerMessages(state.familyId).catch(() => {});
                        }
                    }
                    else if (action === 'switchCalendar') {
                        state.calendarMode = newBtn.getAttribute('data-mode');
                        render();
                    }
                    else if (action === 'openModal') {
                        state.showModal = newBtn.getAttribute('data-modal');
                        state.pendingMemoryType = 'text';
                        state.pendingMemoryImage = '';
                        if (state.showModal === 'videoPlayer') {
                            state.videoUrl = null;
                            state.videoError = null;
                            state.videoGenerating = false;
                        }
                        if (state.showModal === 'logs') {
                            refreshServerLogs();
                        }
                        render();
                    }
                    else if (action === 'refreshLogs') {
                        refreshServerLogs();
                        render();
                    }
                    else if (action === 'generateVideo') {
                        state.videoGenerating = true;
                        state.videoError = null;
                        render();
                        try {
                            const familyId = state.familyId || state.calendarCode;
                            const result = await serverApi(`/api/families/${encodeURIComponent(familyId)}/summary-video`, {
                                method: 'POST',
                                body: JSON.stringify({
                                    month: today.getMonth() + 1,
                                    year: today.getFullYear()
                                })
                            });
                            if (result.error) {
                                state.videoError = result.message || '沒有照片可生成影片';
                            } else {
                                state.videoUrl = `${selfHostedApiBase}${result.videoUrl}`;
                            }
                        } catch (error) {
                            console.error('[video] generation failed', error);
                            state.videoError = '影片生成失敗，請稍後再試。';
                        }
                        state.videoGenerating = false;
                        render();
                    }
                    else if (action === 'requestNotifications') {
                        await requestNotificationPermission();
                        if (state.notificationPermission === 'granted') {
                            await refreshCurrentPushTokenInfo().catch(() => null);
                            showMessage(getPushStatusSummary());
                        }
                    }
                    else if (action === 'installApp') {
                        await installPwaApp();
                    }
                    else if (action === 'closeModal') {
                        const mv = document.getElementById('memVideo');
                        if (mv) { mv.pause(); mv.src = ''; }
                        state.showModal = null;
                        state.dailyRewardCelebration = null;
                        state.selectedDate = null;
                        state.pendingMemoryContent = '';
                        state.videoUrl = null;
                        state.videoError = null;
                        state.videoGenerating = false;
                        render();
                    }
                    else if (action === 'viewMemories') {
                        state.selectedDate = newBtn.getAttribute('data-date');
                        state.showModal = 'memoryDetail';
                        render();
                    }
                    else if (action === 'selectMemoryType') {
                        const memoryContentInput = document.getElementById('memoryContentInput');
                        if (memoryContentInput) state.pendingMemoryContent = memoryContentInput.value;
                        state.pendingMemoryType = newBtn.getAttribute('data-type');
                        if (state.pendingMemoryType !== 'photo') state.pendingMemoryImage = '';
                        render();
                    }
                    else if (action === 'chooseMemoryImage') {
                        const imageInput = document.getElementById('memoryImageInput');
                        imageInput?.click();
                    }
                    else if (action === 'chooseMemoryCamera') {
                        const cameraInput = document.getElementById('memoryCameraInput');
                        cameraInput?.click();
                    }
                    else if (action === 'saveMemory') {
                        const memoryContentInput = document.getElementById('memoryContentInput');
                        const content = memoryContentInput?.value.trim();
                        if (state.pendingMemoryType === 'text' && !content) {
                            state.errorMsg = '請先寫低一點內容。';
                            render();
                            return;
                        }
                        if (state.pendingMemoryType === 'photo' && !content && !state.pendingMemoryImage) {
                            state.errorMsg = '請選擇一張相片或寫低內容。';
                            render();
                            return;
                        }

                        let imgUrl = null;
                        if (state.pendingMemoryType === 'photo' && state.pendingMemoryImage && state.backendMode === 'server') {
                            try {
                                const blob = await fetch(state.pendingMemoryImage).then(r => r.blob());
                                const file = new File([blob], 'memory.jpg', { type: blob.type });
                                const uploaded = await uploadMediaFile(file);
                                imgUrl = uploaded?.mediaUrl || state.pendingMemoryImage;
                            } catch (err) {
                                console.warn('Media upload failed, using base64', err);
                                imgUrl = state.pendingMemoryImage;
                            }
                        }

                        const memoryData = {
                            uid: state.authUid || 'local',
                            date: today.getDate(),
                            month: today.getMonth() + 1,
                            year: today.getFullYear(),
                            childId: state.role === 'child' ? 'child_1' : 'senior',
                            childName: state.userName || (state.role === 'child' ? '我' : '媽媽'),
                            type: state.pendingMemoryType,
                            content,
                            img: imgUrl || (state.pendingMemoryType === 'photo' ? state.pendingMemoryImage : null)
                        };

                        if (state.backendMode === 'server' && state.familyId) {
                            try {

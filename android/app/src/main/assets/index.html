<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF944D">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="星喚">

    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF8F0;
            -webkit-tap-highlight-color: transparent;
            height: var(--app-height, 100dvh);
            min-height: 0;
            overflow: hidden;
            overscroll-behavior: none;
        }
        #app {
            height: var(--app-height, 100dvh);
            min-height: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .tear-off-bg { background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, #e5e7eb 19px, #e5e7eb 20px); }
        
        /* 動畫 */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        /* 日曆撕拉動畫 */
        .calendar-page-container { position: relative; overflow: hidden; touch-action: pan-y; }
        .calendar-page { transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.35s ease; will-change: transform, opacity; }
        .calendar-page.swiping { transition: none; }
        .calendar-page.tear-out-left { animation: tearOutLeft 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .calendar-page.tear-out-right { animation: tearOutRight 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .calendar-page.tear-in-left { animation: tearInLeft 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .calendar-page.tear-in-right { animation: tearInRight 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes tearOutLeft {
            0% { transform: translateX(0) rotate(0deg); opacity: 1; }
            40% { transform: translateX(-30%) rotate(-2deg); opacity: 0.8; }
            100% { transform: translateX(-110%) rotate(-4deg); opacity: 0; }
        }
        @keyframes tearOutRight {
            0% { transform: translateX(0) rotate(0deg); opacity: 1; }
            40% { transform: translateX(30%) rotate(2deg); opacity: 0.8; }
            100% { transform: translateX(110%) rotate(4deg); opacity: 0; }
        }
        @keyframes tearInLeft {
            0% { transform: translateX(110%) rotate(3deg); opacity: 0; }
            60% { transform: translateX(-3%) rotate(-0.5deg); opacity: 1; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
        @keyframes tearInRight {
            0% { transform: translateX(-110%) rotate(-3deg); opacity: 0; }
            60% { transform: translateX(3%) rotate(0.5deg); opacity: 1; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }

        /* 日曆底部指示點 */
        .calendar-day-dot { cursor: pointer; }
        .calendar-day-dot:active { transform: scale(1.3); }

        /* 導航按鈕 */
        .calendar-nav-btn { cursor: pointer; user-select: none; -webkit-user-select: none; }
    </style>

        const STORAGE_KEY = 'beckon-stars-demo-state-v1';
        const initialState = JSON.parse(JSON.stringify(state));
        let unsubscribeMessages = null;
        let unsubscribeMemories = null;
        let hasLoadedCloudMessages = false;
        let hasLoadedCloudMemories = false;
        let shouldStickChatToBottom = false;
        let shouldRestoreChatInputFocus = false;
        let chatDraft = '';
        let lastRenderedMessageCount = state.messages.length;
        const voicePlayback = {
            audio: null,
            messageId: null,
            duration: 0,
            currentTime: 0,
            isPlaying: false
        };

        function getChatMessagesContainer() {
            return document.getElementById('chatMessages');
        }

        function readChatScrollSnapshot() {
            const container = getChatMessagesContainer();
            if (!container) return null;
            const distanceToBottom = container.scrollHeight - (container.scrollTop + container.clientHeight);
            return {
                scrollTop: container.scrollTop,
                distanceToBottom,
                atBottom: distanceToBottom <= 48
            };
        }

        function applyChatScrollAfterRender(previousSnapshot) {
            if (state.currentTab !== 'chat') {
                lastRenderedMessageCount = state.messages.length;
                shouldStickChatToBottom = false;
                return;
            }

            const container = getChatMessagesContainer();
            if (!container) return;

            const shouldAutoScroll = shouldStickChatToBottom || !previousSnapshot || previousSnapshot.atBottom;

            if (shouldAutoScroll) {
                container.scrollTop = container.scrollHeight;
            } else {
                const nextTop = container.scrollHeight - container.clientHeight - (previousSnapshot.distanceToBottom || 0);
                container.scrollTop = Math.max(0, nextTop);
            }

            lastRenderedMessageCount = state.messages.length;
            shouldStickChatToBottom = false;
        }

        function restoreChatInputFocusAfterRender() {
            if (!shouldRestoreChatInputFocus || state.currentTab !== 'chat') return;
            shouldRestoreChatInputFocus = false;

            const chatInput = document.getElementById('chatInput');
            if (!chatInput) return;

            try {
                chatInput.focus({ preventScroll: true });
            } catch (error) {
                chatInput.focus();
            }
            const cursorPosition = chatInput.value.length;
            try {
                chatInput.setSelectionRange(cursorPosition, cursorPosition);
            } catch (error) {}
        }

        function escapeAttribute(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatVoiceTime(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = String(safeSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function getVoiceDurationSeconds(message) {
            return Math.max(0, Math.round((Number(message?.audioDurationMs) || 0) / 1000));
        }

        function getVoiceAudio() {
            if (voicePlayback.audio) return voicePlayback.audio;

            const audio = new Audio();
            audio.preload = 'metadata';
            audio.addEventListener('loadedmetadata', () => {
                if (Number.isFinite(audio.duration)) voicePlayback.duration = audio.duration;
                syncVoicePlayerUi();
            });
            audio.addEventListener('timeupdate', () => {
                voicePlayback.currentTime = audio.currentTime || 0;
                if (Number.isFinite(audio.duration)) voicePlayback.duration = audio.duration;
                syncVoicePlayerUi();
            });
            audio.addEventListener('play', () => {
                voicePlayback.isPlaying = true;
                syncVoicePlayerUi();
            });
            audio.addEventListener('pause', () => {
                voicePlayback.isPlaying = false;
                syncVoicePlayerUi();
            });
            audio.addEventListener('ended', () => {
                voicePlayback.isPlaying = false;
                voicePlayback.currentTime = 0;
                try {
                    audio.currentTime = 0;
                } catch (error) {}
                syncVoicePlayerUi();
            });
            voicePlayback.audio = audio;
            return audio;
        }

        function renderVoicePlayer(message, isMe) {
            const messageId = String(message.id);
            const isActive = voicePlayback.messageId === messageId;
            const duration = isActive && voicePlayback.duration ? voicePlayback.duration : getVoiceDurationSeconds(message);
            const currentTime = isActive ? voicePlayback.currentTime : 0;
            const progress = duration ? Math.min(100, Math.max(0, (currentTime / duration) * 100)) : 0;
            const isPlaying = isActive && voicePlayback.isPlaying;
            const trackClass = isMe ? 'bg-white/25' : 'bg-gray-200';
            const fillClass = isMe ? 'bg-white' : 'bg-brand';
            const buttonClass = isMe ? 'bg-white text-brand' : 'bg-brand text-white';
            const timeClass = isMe ? 'text-white/85' : 'text-gray-500';

            if (!message.audio) {
                return `
                    <div class="flex items-center gap-3 min-w-48">
                        <div class="w-9 h-9 rounded-full ${isMe ? 'bg-white/20' : 'bg-orange-100'} flex items-center justify-center">
                            <i class="fa-solid fa-microphone ${isMe ? 'text-white' : 'text-brand'}"></i>
                        </div>
                        <p class="text-sm opacity-80">錄音檔未同步</p>
                    </div>
                `;
            }

            return `
                <div class="voice-player flex items-center gap-2 w-full" data-message-id="${escapeAttribute(messageId)}" data-duration="${duration}">
                    <button type="button" class="action-btn voice-play-button w-9 h-9 rounded-full ${buttonClass} flex items-center justify-center shrink-0 shadow-sm" data-action="toggleVoice" data-message-id="${escapeAttribute(messageId)}" title="${isPlaying ? '暫停錄音' : '播放錄音'}">
                        <i class="fa-solid ${isPlaying ? 'fa-pause' : 'fa-play'} voice-play-icon text-sm"></i>
                    </button>
                    <button type="button" class="voice-seek-bar flex-1 min-w-24 h-8 flex items-center" data-message-id="${escapeAttribute(messageId)}" title="調整播放位置">
                        <span class="relative block h-2 w-full rounded-full ${trackClass} overflow-hidden">
                            <span class="voice-progress-fill absolute inset-y-0 left-0 rounded-full ${fillClass}" style="width: ${progress}%;"></span>
                        </span>
                    </button>
                    <span class="voice-time flex items-center gap-0.5 text-[11px] tabular-nums ${timeClass} shrink-0">
                        <span class="voice-current">${formatVoiceTime(currentTime)}</span>
                        <span class="opacity-60">/</span>
                        <span class="voice-duration">${formatVoiceTime(duration)}</span>
                    </span>
                </div>
            `;
        }

        function syncVoicePlayerUi() {
            document.querySelectorAll('.voice-player').forEach(player => {
                const messageId = String(player.getAttribute('data-message-id') || '');
                const isActive = voicePlayback.messageId === messageId;
                const duration = isActive && voicePlayback.duration
                    ? voicePlayback.duration
                    : Number(player.getAttribute('data-duration')) || 0;
                const currentTime = isActive ? voicePlayback.currentTime : 0;
                const progress = duration ? Math.min(100, Math.max(0, (currentTime / duration) * 100)) : 0;
                const isPlaying = isActive && voicePlayback.isPlaying;

                const icon = player.querySelector('.voice-play-icon');
                if (icon) icon.className = `fa-solid ${isPlaying ? 'fa-pause' : 'fa-play'} voice-play-icon text-sm`;

                const playButton = player.querySelector('.voice-play-button');
                if (playButton) playButton.title = isPlaying ? '暫停錄音' : '播放錄音';

                const fill = player.querySelector('.voice-progress-fill');
                if (fill) fill.style.width = `${progress}%`;

                const current = player.querySelector('.voice-current');
                if (current) current.textContent = formatVoiceTime(currentTime);

                const total = player.querySelector('.voice-duration');
                if (total) total.textContent = formatVoiceTime(duration);
            });
        }

        function initVideoPlayer() {
            const video = document.getElementById('memVideo');
            const overlay = document.getElementById('videoOverlay');
            const playBtn = document.getElementById('videoPlayBtn');
            const playIcon = document.getElementById('videoPlayIcon');
            const progressFill = document.getElementById('videoProgressFill');
            const progressBar = document.getElementById('videoProgressBar');
            const timeDisplay = document.getElementById('videoTime');
            if (!video) return;

            let hideTimer = null;

            function formatTime(s) {
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return m + ':' + String(sec).padStart(2, '0');
            }

            function showOverlay() {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    if (!video.paused) {
                        overlay.classList.add('opacity-0');
                        overlay.classList.remove('opacity-100');
                    }
                }, 2500);
            }

            overlay.style.transition = 'opacity 0.3s ease';
            overlay.classList.add('opacity-100');

            video.addEventListener('play', () => {
                playIcon.className = 'fa-solid fa-pause text-white text-3xl';
                showOverlay();
            });

            video.addEventListener('pause', () => {
                playIcon.className = 'fa-solid fa-play text-white text-3xl ml-1';
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            });

            video.addEventListener('timeupdate', () => {
                if (video.duration) {
                    const pct = (video.currentTime / video.duration) * 100;
                    progressFill.style.width = pct + '%';
                    timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
                }
            });

            video.addEventListener('ended', () => {
                playIcon.className = 'fa-solid fa-play text-white text-3xl ml-1';
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            });

            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (video.paused) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });

            overlay.addEventListener('click', (e) => {
                e.stopPropagation();
                if (video.paused) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });

            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                video.currentTime = pct * video.duration;
            });

            video.addEventListener('click', () => {
                if (video.paused) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });

            video.play().catch(() => {});
        }

        async function toggleVoiceMessage(messageId) {
            const id = String(messageId || '');
            const message = state.messages.find(item => String(item.id) === id);
            if (!message?.audio) {
                showMessage('錄音檔未同步，暫時不能播放。');
                return;
            }

            const audio = getVoiceAudio();
            if (voicePlayback.messageId === id && !audio.paused) {
                audio.pause();
                return;
            }

            if (voicePlayback.messageId !== id) {
                audio.pause();
                voicePlayback.messageId = id;
                voicePlayback.duration = getVoiceDurationSeconds(message);
                voicePlayback.currentTime = 0;
                audio.src = message.audio;
                try {
                    audio.currentTime = 0;
                } catch (error) {}
            }

            try {
                await audio.play();
            } catch (error) {
                console.warn('Voice playback failed', error);
                voicePlayback.isPlaying = false;
                syncVoicePlayerUi();
                showMessage('錄音播放失敗，請稍後再試。');
            }
        }

        function seekVoiceMessage(messageId, ratio) {
            const id = String(messageId || '');
            const message = state.messages.find(item => String(item.id) === id);
            if (!message?.audio) return;

            const audio = getVoiceAudio();
            if (voicePlayback.messageId !== id) {
                audio.pause();
                voicePlayback.messageId = id;
                voicePlayback.duration = getVoiceDurationSeconds(message);
                voicePlayback.currentTime = 0;
                audio.src = message.audio;
            }

            const duration = voicePlayback.duration || getVoiceDurationSeconds(message);
            if (!duration) return;

            const nextTime = Math.min(duration, Math.max(0, duration * ratio));
            try {
                audio.currentTime = nextTime;
            } catch (error) {}
            voicePlayback.currentTime = nextTime;
            syncVoicePlayerUi();
        }
        let deferredInstallPrompt = null;
        let serviceWorkerRegistration = null;

        const selfHostedApiBase = 'http://144.79.170.102:8787';

        function loadDemoData() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!saved) return;
                Object.assign(state, saved, {
                    errorMsg: '',
                    showModal: null,
                    modalMessage: '',
                    selectedDate: null,
                    pendingMemoryType: saved.pendingMemoryType || 'text',
                    isForwardingMessage: false,
                    backendMode: 'server',

                    pushTokenCount: saved.pushTokenCount || 0,
                    pushTokenPreview: saved.pushTokenPreview || ''

                console.warn('Unable to load demo data', error);
            }

        function saveDemoData() {
            const data = JSON.parse(JSON.stringify(state));
            data.errorMsg = '';
            data.showModal = null;
            data.modalMessage = '';
            data.selectedDate = null;
            data.pendingMemoryImage = '';
            data.pushStatus = '';
            data.messages = [];
            data.memories = [];
            data.voiceRecording = { active: false, cancel: false, startY: 0 };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getOrCreateServerUid() {
            const key = 'beckon-stars-server-uid';
            let uid = localStorage.getItem(key);
            if (!uid) {
                uid = `apk_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
                localStorage.setItem(key, uid);
            }
            return uid;
        }

        async function serverApi(path, options = {}) {
            const response = await fetch(`${selfHostedApiBase}${path}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            if (!response.ok) {
                const error = new Error(`server-${response.status}`);
                error.status = response.status;
                throw error;
            }
            return response.status === 204 ? null : response.json();
        }

        async function requestNotificationPermission() {
            if (isAndroidApk()) {
                const granted = window.BeckonStarsAndroid.requestNotificationPermission();
                state.notificationPermission = getRuntimeNotificationPermission();
                render();
                if (granted || state.notificationPermission === 'granted') {
                    showLocalNotification('星喚通知已開啟', 'APK 會由 Android 原生通知處理提示。');

                    return;

                showMessage('請在 Android 權限視窗或 App 設定中允許通知。');

            if (!('Notification' in window)) {
                showMessage('此瀏覽器不支援通知。Android Chrome 建議安裝到主畫面後再試。');
                return;
            }

            const permission = await Notification.requestPermission();
            state.notificationPermission = permission;
            render();
            if (permission === 'granted') {
                await registerPushToken();
                showLocalNotification('星喚通知已開啟', '之後有新家庭訊息時，會在可支援的環境提示你。');

        async function refreshServerMessages(familyId) {
            const result = await serverApi(`/api/families/${encodeURIComponent(familyId)}/messages`);
            const incoming = (result.messages || []).map(message => normalizeCloudMessage(message.id, message));
            const knownIds = new Set(state.messages.map(message => String(message.id)));
            if (hasLoadedCloudMessages) {
                incoming.forEach(message => {
                    if (!knownIds.has(String(message.id)) && message.senderId !== state.authUid && document.hidden) {
                        showLocalNotification(`星喚：${message.senderName}`, message.content || '你有新的家庭訊息');
                    }
                });
            }
            const changed = JSON.stringify(state.messages) !== JSON.stringify(incoming);
            if (changed) state.messages = incoming;
            state.isForwardingMessage = false;
            hasLoadedCloudMessages = true;
            if (changed) render();
        }

        function subscribeFamilyMessages(familyId) {
            if (unsubscribeMessages) unsubscribeMessages();
            refreshServerMessages(familyId).catch(error => {
                console.warn('Server message sync failed', error);
            });
            const timer = setInterval(() => refreshServerMessages(familyId).catch(error => {
                console.warn('Server message sync failed', error);
            }), 2000);
            unsubscribeMessages = () => clearInterval(timer);
        }

        function normalizeCloudMessage(id, data) {
            const date = data.createdAt?.toDate ? data.createdAt.toDate() : (data.createdAt ? new Date(data.createdAt) : new Date());
            return {
                id,
                senderId: data.senderId || data.uid || 'member',
                senderName: data.senderName || '家庭成員',
                type: data.type || 'text',
                content: data.content || '',
                time: data.time || `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`,
                childId: data.childId || 'child_1',

        async function refreshServerMemories(familyId) {
            const result = await serverApi(`/api/families/${encodeURIComponent(familyId)}/memories`);

            const knownIds = new Set(state.memories.map(memory => String(memory.id)));

                { id: 'chat', icon: 'fa-comments', label: '聊天' },
                { id: 'rewards', icon: 'fa-gift', label: '獎勵' }
            ];

            return `
                <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-6 pt-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))] flex justify-between items-center z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                    ${tabs.map(tab => `
                        <button class="action-btn flex flex-col items-center p-2 flex-1 ${state.currentTab === tab.id ? 'text-brand' : 'text-gray-400'}" data-action="switchTab" data-tab="${tab.id}">
                            <i class="fa-solid ${tab.icon} text-2xl mb-1 transition-transform ${state.currentTab === tab.id ? 'transform scale-110' : ''}"></i>
                            <span class="text-xs font-medium">${tab.label}</span>
                        </button>
                    `).join('')}
                </nav>
            `;
        }

        // 日曆視圖
        function renderCalendar() {
            let visibleMemories = state.memories;
            if (state.role === 'child') {
                visibleMemories = state.memories.filter(m => m.childId === 'child_1');
            }

            return `
                <div class="p-6" id="calendarContent">
                    <div class="flex bg-gray-200 rounded-xl p-1 mb-6">
                        <button class="action-btn flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${state.calendarMode === 'tear-off' ? 'bg-white text-brand shadow' : 'text-gray-500'}" data-action="switchCalendar" data-mode="tear-off">
                            手撕日曆
                        </button>
                        <button class="action-btn flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${state.calendarMode === 'monthly' ? 'bg-white text-brand shadow' : 'text-gray-500'}" data-action="switchCalendar" data-mode="monthly">
                            現時月曆
                        </button>
                    </div>

                    ${state.calendarMode === 'tear-off' ? renderTearOffCalendar(visibleMemories) : renderMonthlyCalendar(visibleMemories)}

                    <button class="action-btn mt-6 w-full bg-white border-2 border-orange-100 text-brand-dark py-4 rounded-2xl font-bold text-lg shadow-sm flex items-center justify-center hover:bg-orange-50 transition-colors" data-action="openModal" data-modal="weeklySummary">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2 text-brand"></i> 生成家庭回憶摘要
                    </button>

                    <button class="action-btn mt-4 w-full bg-brand text-white py-4 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center hover:bg-brand-dark transition-colors" data-action="openModal" data-modal="addMemory">
                        <i class="fa-solid fa-plus-circle mr-2 text-xl"></i> 記錄今日回憶
                    </button>
                </div>
            `;
        }

        // 只更新日曆容器（不重建整個 DOM，避免閃爍）
        function updateCalendarContent() {
            let visibleMemories = state.memories;
            if (state.role === 'child') {
                visibleMemories = state.memories.filter(m => m.childId === 'child_1');
            }
            const calendarEl = document.getElementById('calendarContent');
            if (!calendarEl) return;

            // 保留切換按鈕和底部按鈕，只替換中間的日曆內容
            const tmp = document.createElement('div');
            tmp.innerHTML = state.calendarMode === 'tear-off'
                ? renderTearOffCalendar(visibleMemories)
                : renderMonthlyCalendar(visibleMemories);
            const newCalendar = tmp.firstElementChild;

            // 找到現有的日曆容器（切換按鈕之後的第一個子元素）
            const switcher = calendarEl.querySelector('.flex.bg-gray-200');
            if (switcher && switcher.nextElementSibling) {
                // 如果現有元素有 calendarPageContainer，保留其動畫狀態
                const oldContainer = switcher.nextElementSibling;
                calendarEl.replaceChild(newCalendar, oldContainer);
            }

            // 重新綁定日曆區塊的事件
            calendarEl.querySelectorAll('.calendar-nav-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    event.stopPropagation();
                    navigateCalendarMonth(parseInt(btn.getAttribute('data-calendar-dir')));
                });
            });
            setupCalendarSwipe();
        }

        // 手撕日曆 - 產生某一天的頁面 HTML（不含容器）
        function tearOffPageHtml(displayDay, displayYear, displayMonth, memories) {
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const displayDate = new Date(displayYear, displayMonth - 1, displayDay);
            const isCurrentMonth = displayYear === today.getFullYear() && displayMonth === today.getMonth() + 1;
            const isToday = isCurrentMonth && displayDay === today.getDate();
            const dayMemories = memories.filter(m => m.date === displayDay && m.month === displayMonth);
            const almanac = state.almanac;
            const hasAlmanac = almanac && almanac.ok;

            // 農曆日期顯示
            let lunarDisplay = '';
            if (hasAlmanac) {
                const lunar = almanac.lunar;
                lunarDisplay = `<p class="text-xs text-gray-400 mt-1">${lunar.dayGanZhi}日 · 農曆${lunar.month}月${lunar.day}${lunar.jieQi ? ' · ' + lunar.jieQi : ''}</p>`;
            }

            // 宜忌顯示
            let yiJiHtml = '';
            if (hasAlmanac) {
                yiJiHtml = `
                    <div class="bg-[#FFF8F0] border border-orange-200 rounded-xl p-4 shadow-sm inline-block text-left">
                        <div class="mb-2">
                            <span class="bg-orange-100 text-brand-dark px-2 py-1 rounded text-sm font-bold mr-2">${isToday ? '今日宜' : '宜'}</span>
                            <span class="text-gray-700 font-medium">${almanac.yiDisplay}</span>
                        </div>
                        <div>
                            <span class="bg-red-50 text-red-600 px-2 py-1 rounded text-sm font-bold mr-2">忌</span>
                            <span class="text-gray-500 font-medium">${almanac.jiDisplay}</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-2">${almanac.lunar.pengZu} · ${almanac.lunar.xiu}宿${almanac.lunar.xiuLuck ? ' · ' + almanac.lunar.xiuLuck : ''}</p>
                    </div>
                `;
            } else {
                yiJiHtml = `
                    <div class="bg-[#FFF8F0] border border-orange-200 rounded-xl p-4 shadow-sm inline-block">
                        <span class="bg-orange-100 text-brand-dark px-2 py-1 rounded text-sm font-bold mr-2">${isToday ? '今日宜' : '宜'}</span>
                        <span class="text-gray-700 font-medium">${getDailySuggestion()}</span>
                    </div>
                `;
            }

            return `
                <div class="p-8 text-center relative tear-off-bg">
                    <h3 class="text-2xl font-medium text-gray-500 mb-2">${dayNames[displayDate.getDay()]}</h3>
                    <h1 class="text-8xl font-bold text-gray-800 mb-2 font-serif">${displayDay}</h1>
                    ${lunarDisplay}
                    <div class="mt-4">${yiJiHtml}</div>
                </div>
                ${dayMemories.length > 0 ? `
                    <div class="bg-orange-50 p-4 border-t border-orange-100">
                        <p class="text-sm font-bold text-brand-dark mb-2"><i class="fa-solid fa-heart"></i> ${displayDay}日已有 ${dayMemories.length} 個回憶</p>
                        <div class="flex gap-2 overflow-x-auto no-scrollbar">
                            ${dayMemories.map(m => `
                                <div class="w-12 h-12 rounded-lg bg-white border border-orange-200 flex-shrink-0 flex items-center justify-center overflow-hidden">
                                    ${m.img ? `<img src="${m.img}" class="w-full h-full object-cover">` : `<i class="fa-solid ${m.type === 'audio' ? 'fa-microphone text-blue-400' : 'fa-font text-gray-400'} text-xl"></i>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
        }

        // 手撕日曆
        function renderTearOffCalendar(memories) {
            const daysInMonth = new Date(state.calendarYear, state.calendarMonth, 0).getDate();
            const displayDay = Math.min(state.calendarDay || today.getDate(), daysInMonth);
            const isCurrentMonth = state.calendarYear === today.getFullYear() && state.calendarMonth === today.getMonth() + 1;

            return `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-2 border-gray-100 relative" id="tearOffCalendar">
                    <div class="bg-brand-red text-white py-3 px-6 flex justify-between items-center">
                        <button class="calendar-nav-btn text-white/80 hover:text-white text-lg px-2" data-calendar-dir="-1"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="text-xl font-bold">${state.calendarYear}年 ${state.calendarMonth}月</span>
                        <button class="calendar-nav-btn text-white/80 hover:text-white text-lg px-2" data-calendar-dir="1"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <div class="calendar-page-container overflow-hidden relative" id="calendarPageContainer">
                        <div class="calendar-page" id="calendarPage">
                            ${tearOffPageHtml(displayDay, state.calendarYear, state.calendarMonth, memories)}
                        </div>
                    </div>
                </div>
            `;
        }

        // 月曆 - 產生某個月的頁面 HTML（不含容器）
        function monthlyPageHtml(calYear, calMonth, memories) {
            const daysInMonth = new Date(calYear, calMonth, 0).getDate();
            const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
            const isCurrentMonth = calYear === today.getFullYear() && calMonth === today.getMonth() + 1;
            const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

            let gridHtml = dayNames.map(d => `<div class="text-center text-sm font-bold text-gray-400 py-2">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) gridHtml += `<div></div>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const isToday = isCurrentMonth && i === today.getDate();
                const dayMemories = memories.filter(m => m.date === i && m.month === calMonth);
                const hasMemory = dayMemories.length > 0;
                gridHtml += `
                    <div class="aspect-square flex items-center justify-center p-1 relative">
                        <button class="action-btn w-full h-full rounded-xl flex items-center justify-center font-medium text-lg transition-all ${isToday ? 'bg-brand text-white shadow-md' : 'bg-gray-50 text-gray-700 hover:bg-orange-100'} ${hasMemory && !isToday ? 'border-2 border-brand-light' : ''}"
                                ${hasMemory ? `data-action="viewMemories" data-date="${i}" data-month="${calMonth}"` : ''}>
                            ${i}
                        </button>
                        ${hasMemory ? `<div class="absolute top-2 right-2 w-2 h-2 bg-brand-red rounded-full shadow-sm"></div>` : ''}
                    </div>
                `;
            }

            return `
                <div class="flex justify-between items-center mb-4">
                    <button class="calendar-nav-btn text-gray-400 hover:text-brand transition-colors p-2" data-calendar-dir="-1"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 class="text-xl font-bold text-gray-800">${calYear}年 ${calMonth}月</h3>
                    <button class="calendar-nav-btn text-gray-400 hover:text-brand transition-colors p-2" data-calendar-dir="1"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-2 mb-6">
                    ${gridHtml}
                </div>
            `;
        }

        // 月曆
        function renderMonthlyCalendar(memories) {
            const calYear = state.calendarYear;
            const calMonth = state.calendarMonth;

            return `
                <div class="bg-white rounded-3xl shadow-lg p-5 border border-gray-100 relative" id="monthlyCalendar">
                    <div class="calendar-page-container overflow-hidden relative" id="calendarPageContainer">
                        <div class="calendar-page" id="calendarPage">
                            ${monthlyPageHtml(calYear, calMonth, memories)}
                        </div>
                    </div>

                    <button class="action-btn w-full bg-gradient-to-r from-orange-400 to-brand-dark text-white rounded-xl p-4 flex items-center justify-between shadow-md mt-4" data-action="openModal" data-modal="videoPlayer">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-white/30 rounded-full flex items-center justify-center mr-3 backdrop-blur-sm">
                                <i class="fa-solid fa-play text-white"></i>
                            </div>
                            <div class="text-left">
                                <p class="font-bold text-lg">本月回憶影片</p>
                                <p class="text-xs text-orange-100">為您集合這個月的溫暖時刻</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-white/70"></i>
                    </button>
                </div>
            `;
        }

        // 聊天視圖
        function renderChat() {
            let visibleMessages = state.messages;
            return `
                <div class="flex flex-col h-full min-h-0 bg-[#FFF8F0]">
                    <div id="chatMessages" class="flex-1 min-h-0 px-4 pt-4 pb-3 space-y-6 overflow-y-auto no-scrollbar">
                        <div class="text-center text-xs text-gray-400 mb-4">今天</div>

                        ${visibleMessages.map(msg => {
                            const isMe = msg.senderId === state.authUid || msg.uid === state.authUid;
                            
                            // 更新為使用者自己設定的名字和頭像 (僅限當前使用者發送的訊息)
                            const displayAvatar = isMe ? state.userAvatar : (msg.senderName[0] || '👤');
                            const displayName = isMe ? state.userName : msg.senderName;
                            
                            return `
                                <div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-fadeIn">
                                    ${!isMe ? `
                                        <div class="w-10 h-10 rounded-full bg-orange-200 flex items-center justify-center text-brand-dark font-bold mr-2 flex-shrink-0 text-xl">
                                            ${displayAvatar}
                                        </div>
                                    ` : ''}
                                    <div class="max-w-[75%] flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                                        ${!isMe ? `<span class="text-xs text-gray-500 mb-1 ml-1">${displayName}</span>` : ''}
                                        
                                        <div class="p-3 rounded-2xl shadow-sm ${isMe ? 'bg-brand text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'}">
                                            ${msg.type === 'text' ? `<p class="text-lg">${msg.content}</p>` : ''}
                                            ${msg.type === 'photo' && msg.img ? `
                                                <img src="${msg.img}" class="max-w-56 max-h-56 rounded-xl object-cover mb-2">
                                                ${msg.content ? `<p class="text-base">${msg.content}</p>` : ''}
                                            ` : ''}
                                            ${msg.type === 'audio' ? `
                                                <div class="space-y-2 w-60 max-w-[68vw]">
                                                    ${renderVoicePlayer(msg, isMe)}
                                                    <div class="${isMe ? 'bg-white/10' : 'bg-gray-50'} rounded-xl p-2">
                                                        <p class="text-[11px] opacity-70 mb-1">語音轉譯</p>
                                                        ${msg.transcript ? `<p class="text-base">${msg.transcript}</p>` : `<p class="text-sm opacity-80">未取得轉譯文字，可播放錄音確認內容。</p>`}
                                                    </div>
                                                </div>
                                            ` : ''}
                                        </div>
                                        
                                        ${msg.type === 'audio' && msg.transcript && !msg.aiSummary && state.backendMode === 'server' ? `
                                            <button class="action-btn mt-2 bg-blue-50 border border-blue-100 text-blue-700 rounded-xl px-3 py-2 text-sm font-bold" data-action="summarizeVoice" data-message-id="${msg.id}">
                                                <i class="fa-solid fa-wand-magic-sparkles mr-1"></i>總結錄音
                                            </button>
                                        ` : ''}
                                        ${msg.type === 'audio' && msg.audio && !msg.transcript && state.backendMode === 'server' ? `
                                            <button class="action-btn mt-2 bg-amber-50 border border-amber-100 text-amber-700 rounded-xl px-3 py-2 text-sm font-bold disabled:opacity-60" data-action="transcribeVoice" data-message-id="${msg.id}" ${state.transcribingMessageId === msg.id ? 'disabled' : ''}>
                                                <i class="fa-solid ${state.transcribingMessageId === msg.id ? 'fa-spinner fa-spin' : 'fa-closed-captioning'} mr-1"></i>${state.transcribingMessageId === msg.id ? 'AI 轉譯中' : 'AI 轉譯錄音'}
                                            </button>
                                        ` : ''}
                                        ${msg.aiSummary ? `
                                            <div class="mt-2 bg-blue-50 border border-blue-100 rounded-xl p-3 shadow-sm relative w-full">
                                                <div class="absolute -top-2 -left-2 bg-blue-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-md">
                                                    <i class="fa-solid fa-robot"></i>
                                                </div>
                                                <p class="text-sm text-blue-800 pl-3 font-medium">${msg.aiSummary}</p>
                                            </div>
                                        ` : ''}
                                        <span class="text-[10px] text-gray-400 mt-1">${msg.time}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        ${state.isForwardingMessage ? `
                            <div class="flex justify-start animate-fadeIn">
                                <div class="w-10 h-10 rounded-full bg-orange-200 flex items-center justify-center text-brand-dark font-bold mr-2 flex-shrink-0 text-xl">媽</div>
                                <div class="bg-white text-gray-500 border border-gray-100 px-4 py-3 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-2">
                                    <span class="w-2 h-2 bg-brand rounded-full animate-pulse"></span>
                                    <span class="text-sm font-medium">訊息轉發中...</span>
                                </div>
                            </div>
                        ` : ''}
                        <div id="chatBottomAnchor" aria-hidden="true" class="h-px"></div>
                    </div>

                    <div class="shrink-0 bg-white px-3 py-3 border-t border-gray-100 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] flex items-center gap-2">
                        <button id="voiceHoldButton" class="w-10 h-10 rounded-full ${state.voiceRecording.active ? (state.voiceRecording.cancel ? 'bg-red-100 text-red-600' : 'bg-brand text-white') : 'bg-gray-100 text-gray-500'} flex items-center justify-center shrink-0 select-none touch-none" title="按住錄音，上滑取消">
                            <i class="fa-solid fa-microphone text-xl"></i>
                        </button>
                        <button class="action-btn w-10 h-10 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center shrink-0" data-action="selectChatImage" title="傳送圖片">
                            <i class="fa-solid fa-image text-xl"></i>
                        </button>
                        <input id="chatImageInput" type="file" accept="image/*" class="hidden">
                        <input id="chatInput" type="text" value="${escapeAttribute(chatDraft)}" placeholder="發送溫暖訊息..." class="min-w-0 flex-1 bg-gray-100 rounded-full px-4 py-3 text-base outline-none focus:ring-2 focus:ring-brand-light">
                        <button class="action-btn w-12 h-12 rounded-full bg-brand text-white flex items-center justify-center shrink-0 shadow-md hover:bg-brand-dark transition-colors" data-action="sendMessage">
                            <i class="fa-solid fa-paper-plane text-xl"></i>
                        </button>
                    </div>
                    ${state.voiceRecording.active ? `
                        <div class="absolute inset-x-6 bottom-32 z-40 rounded-2xl ${state.voiceRecording.cancel ? 'bg-red-500' : 'bg-gray-900'} text-white p-4 text-center shadow-2xl">
                            <i class="fa-solid ${state.voiceRecording.cancel ? 'fa-ban' : 'fa-microphone'} text-2xl mb-2"></i>
                            <p class="font-bold">${state.voiceRecording.cancel ? '鬆手取消發送' : '正在錄音，鬆手發送'}</p>
                            <p class="text-xs opacity-80 mt-1">按住說話；手指向上滑到取消區即可取消</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // 獎勵視圖
        function renderRewards() {
            return `
                <div class="p-6">
                    <div class="bg-gradient-to-br from-brand-light to-brand text-white rounded-3xl p-6 shadow-lg mb-8 relative overflow-hidden">
                        <i class="fa-solid fa-star absolute -right-4 -bottom-4 text-7xl text-white opacity-20 transform -rotate-15"></i>
                        <h3 class="text-xl font-bold mb-1">每日溫馨任務</h3>
                        <p class="text-white/80 text-sm mb-4">發送5條訊息與家人保持聯絡</p>
                        
                        <div class="bg-black/10 rounded-full h-3 mb-2 relative overflow-hidden">
                            <div class="bg-white h-full rounded-full transition-all duration-1000" style="width: ${(state.dailyMessages/5)*100}%;"></div>
                        </div>
                        <div class="flex justify-between text-sm font-bold">
                            <span>進度</span>
                            <span>${state.dailyMessages} / 5 條</span>
                        </div>
                        
                        ${state.dailyMessages >= 5 && !state.claimedDailyReward ? `
                            <button class="action-btn mt-4 w-full bg-white text-brand font-bold py-2 rounded-xl shadow" data-action="claimDailyReward">領取今日積分 (+50)</button>
                        ` : state.claimedDailyReward ? `
                            <p class="mt-4 text-xs text-center text-white/80 font-bold">今日積分已領取</p>
                        ` : `
                            <p class="mt-4 text-xs text-center text-white/70">仲差${5 - state.dailyMessages}條訊息就可以拎積分啦！</p>
                        `}
                    </div>

                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa-solid fa-ticket text-brand mr-2"></i> 獎勵兌換
                    </h3>

                    <div class="space-y-4">
                        ${state.rewards.map(reward => `
                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center">
                                <div class="w-14 h-14 rounded-full ${reward.color} flex items-center justify-center text-2xl mr-4 shrink-0">
                                    <i class="fa-solid ${reward.icon}"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-bold text-gray-800 text-lg leading-tight">${reward.title}</h4>
                                    <p class="text-brand font-bold text-sm mt-1">${reward.points} 積分</p>
                                </div>
                                <button class="action-btn ml-2 px-4 py-2 rounded-xl font-bold text-sm ${state.redeemedRewards.includes(reward.id) ? 'bg-green-100 text-green-600' : state.points >= reward.points ? 'bg-brand text-white shadow-md hover:bg-brand-dark' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}" data-action="redeemReward" data-reward-id="${reward.id}">
                                    ${state.redeemedRewards.includes(reward.id) ? '已換' : '兌換'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- 彈出視窗 ---
        function renderModals() {
            if (!state.showModal) return '';

            let modalContent = '';

            // 刪除數據確認彈窗
            if (state.showModal === 'confirmReset') {
                modalContent = `
                    <div class="bg-white w-[80%] max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-fadeIn">
                        <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">確定刪除數據？</h3>
                        <p class="text-gray-600 mb-6 text-sm">這將會清除您的所有設定與進度，並返回初始選擇角色畫面。</p>

            return `

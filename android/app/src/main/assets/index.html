    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        /* ===== 長者模式 CSS 變數 ===== */
        :root {
            --font-xs: 12px; --font-sm: 14px; --font-base: 16px;
            --font-lg: 18px; --font-xl: 20px; --font-2xl: 24px;
            --font-3xl: 30px; --font-4xl: 36px;
            --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
            --space-lg: 16px; --space-xl: 24px;
            --btn-min-h: 44px; --touch-target: 40px;
            --line-height: 1.4; --radius: 16px;
        }
        .senior-mode {
            --font-xs: 15px; --font-sm: 18px; --font-base: 20px;
            --font-lg: 22px; --font-xl: 24px; --font-2xl: 28px;
            --font-3xl: 32px; --font-4xl: 38px;
            --space-xs: 6px; --space-sm: 10px; --space-md: 16px;
            --space-lg: 20px; --space-xl: 28px;
            --btn-min-h: 52px; --touch-target: 48px;
            --line-height: 1.5; --radius: 20px;
        }
        .bs-text-xs { font-size: var(--font-xs); line-height: var(--line-height); }
        .bs-text-sm { font-size: var(--font-sm); line-height: var(--line-height); }
        .bs-text-base { font-size: var(--font-base); line-height: var(--line-height); }
        .bs-text-lg { font-size: var(--font-lg); line-height: var(--line-height); }
        .bs-text-xl { font-size: var(--font-xl); line-height: var(--line-height); }
        .bs-text-2xl { font-size: var(--font-2xl); line-height: var(--line-height); }
        .bs-text-3xl { font-size: var(--font-3xl); line-height: var(--line-height); }
        .bs-text-4xl { font-size: var(--font-4xl); line-height: var(--line-height); }

        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF8F0;
            -webkit-tap-highlight-color: transparent;
            height: var(--app-height, 100dvh);
            min-height: 0;

        .tear-off-bg { background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, #e5e7eb 19px, #e5e7eb 20px); }
        
        /* 動畫 */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        @keyframes recordingPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
        .recording-pulse { animation: recordingPulse 1.1s ease-in-out infinite; }
        @keyframes rewardCardPop { 0% { opacity: 0; transform: translateY(18px) scale(0.92); } 60% { opacity: 1; transform: translateY(-2px) scale(1.02); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes rewardHaloPulse { 0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(0.92); } 50% { opacity: 0.95; transform: translate(-50%, -50%) scale(1.08); } }
        @keyframes rewardSparkFloat { 0% { opacity: 0; transform: translateY(8px) scale(0.75) rotate(0deg); } 25% { opacity: 1; } 100% { opacity: 0; transform: translateY(-24px) scale(1.1) rotate(18deg); } }
        @keyframes rewardAvatarPulse { 0%, 100% { transform: scale(1); } 45% { transform: scale(1.07); } }
        .daily-reward-card { animation: rewardCardPop 0.62s cubic-bezier(0.16, 1, 0.3, 1); }
        .daily-reward-halo { position: absolute; left: 50%; top: 50%; width: 9rem; height: 9rem; border-radius: 9999px; background: radial-gradient(circle, rgba(255, 209, 102, 0.42) 0%, rgba(255, 148, 77, 0.20) 48%, transparent 72%); animation: rewardHaloPulse 1.8s ease-in-out infinite; }
        .daily-reward-avatar-shell { animation: rewardAvatarPulse 1.9s ease-in-out infinite; }
        .daily-reward-spark { position: absolute; color: #facc15; text-shadow: 0 0 14px rgba(250, 204, 21, 0.55); animation: rewardSparkFloat 1.65s ease-in-out infinite; }
        .daily-reward-spark:nth-child(1) { left: 16%; top: 30%; animation-delay: 0s; }
        .daily-reward-spark:nth-child(2) { right: 15%; top: 26%; animation-delay: 0.24s; }
        .daily-reward-spark:nth-child(3) { left: 24%; bottom: 26%; animation-delay: 0.48s; }
        .daily-reward-spark:nth-child(4) { right: 22%; bottom: 22%; animation-delay: 0.72s; }
        .avatar-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-core { border-radius: 9999px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
        .avatar-reward-frame { position: absolute; left: 50%; top: 50%; display: block; width: 136%; height: 136%; max-width: none; max-height: none; aspect-ratio: 1 / 1; object-fit: contain; transform: translate(-50%, -50%); pointer-events: none; z-index: 2; }

        /* 日曆連續跟手疊頁動畫 */

        }

            aiImageResults: [],               // 生成的圖片結果數組
            aiImageCount: 4,                  // 生成圖片數量 (1-4)

                { id: 1, date: today.getDate(), month: today.getMonth() + 1, childId: 'child_1', childName: '大仔 (阿強)', type: 'photo', content: '今日去咗飲茶，啲點心好靚！', img: 'https://images.unsplash.com/photo-1563245372-f21724e3856d?auto=format&fit=crop&w=300&q=80' },

                { id: 3, senderId: 'senior', senderName: '媽媽', type: 'audio', content: '[長達2分鐘的錄音]', aiSummary: 'AI 摘要：提你記得著褸，同埋帶遮，唔好唔記得食夜晚。', time: '14:30', childId: 'child_1' },
                { id: 4, senderId: 'child_2', senderName: '細女 (阿妹)', type: 'text', content: '媽咪，週末不如去行山？', time: '昨天', childId: 'child_2' }

            rewards: [

                { id: 2, title: '稻香茶樓 點心八折券', points: 300, icon: 'fa-mug-hot', color: 'bg-orange-100 text-orange-600' },
                { id: 3, title: '康樂設施 免費租借一次', points: 200, icon: 'fa-table-tennis', color: 'bg-green-100 text-green-600' }
            ]
        };

        const STORAGE_KEY = 'beckon-stars-demo-state-v1';
        const DAILY_CARD_MODE_KEY = 'beckon-stars-daily-card-mode';
        const DAILY_REWARD_CELEBRATED_DATE_KEY = 'beckon-stars-daily-reward-celebrated-date';
        const initialState = JSON.parse(JSON.stringify(state));
        let unsubscribeMessages = null;
        let unsubscribeMemories = null;
        let hasLoadedCloudMessages = false;
        let hasLoadedCloudMemories = false;
        let shouldStickChatToBottom = false;
        let shouldRestoreChatInputFocus = false;
        let chatDraft = '';
        let lastRenderedMessageCount = state.messages.length;
        const voicePlayback = {
            audio: null,
            messageId: null,
            duration: 0,
            currentTime: 0,
            isPlaying: false
        };

        let voiceRecordingTimer = null;

        function createIdleVoiceRecordingState() {
            return {
                active: false,
                cancel: false,
                locked: false,
                startX: 0,
                startY: 0,
                elapsedMs: 0,
                gesture: 'idle'
            };
        }

        function formatRecordingElapsed(ms) {
            const seconds = Math.max(0, Math.floor((Number(ms) || 0) / 1000));
            const minutes = Math.floor(seconds / 60);
            const remaining = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(remaining).padStart(2, '0')}`;
        }

        function getVoiceRecordingGesture(recording, clientX, clientY) {
            if (!recording?.active) return { cancel: false, locked: false, gesture: 'idle' };

            const dx = clientX - recording.startX;
            const dy = clientY - recording.startY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            const locked = dy < -45 && absDy > absDx * 0.9;
            const cancel = dx > 40 && absDx > absDy * 1.15;

            return {
                cancel,
                locked,
                gesture: locked ? 'lock' : cancel ? 'cancel' : 'recording'
            };
        }

        function updateVoiceRecordingTimerUi() {
            if (!state.voiceRecording.active) return;
            const elapsed = formatRecordingElapsed(state.voiceRecording.elapsedMs);
            const timerEl = document.getElementById('voiceRecordingTimerText');
            if (timerEl && timerEl.textContent !== elapsed) {
                timerEl.textContent = elapsed;
            }
            const lockedTimerEl = document.getElementById('voiceRecordingLockedTimerText');
            if (lockedTimerEl && lockedTimerEl.textContent !== elapsed) {
                lockedTimerEl.textContent = elapsed;
            }
        }

        function startVoiceRecordingTimer(startedAt = Date.now()) {
            stopVoiceRecordingTimer();
            voiceRecordingTimer = setInterval(() => {
                if (!state.voiceRecording.active) {
                    stopVoiceRecordingTimer();
                    return;
                }
                state.voiceRecording.elapsedMs = Date.now() - startedAt;
                updateVoiceRecordingTimerUi();
            }, 500);
        }

        function stopVoiceRecordingTimer() {
            if (voiceRecordingTimer) clearInterval(voiceRecordingTimer);
            voiceRecordingTimer = null;
        }

        function resetVoiceRecordingState() {
            stopVoiceRecordingTimer();
            state.voiceRecording = createIdleVoiceRecordingState();
        }

        function resolveMediaUrl(value) {
            const url = String(value || '').trim();
            if (!url) return '';
            if (url.startsWith('data:') || url.startsWith('http://') || url.startsWith('https://') || url.startsWith('file:')) return url;
            if (url.startsWith('/')) return `${selfHostedApiBase}${url}`;
            return url;
        }

        function isRemoteUrl(value) {
            const url = String(value || '').trim();
            return url.startsWith('http://') || url.startsWith('https://');
        }

        function isImageDataUrl(value) {
            return String(value || '').trim().startsWith('data:image/');
        }

        function extractAIImageUrls(content) {
            const text = String(content || '');
            const images = [];
            const seen = new Set();
            const addImage = url => {
                const value = String(url || '').trim();
                if (!value || seen.has(value)) return;
                if (!isRemoteUrl(value) && !isImageDataUrl(value)) return;
                seen.add(value);
                images.push(value);
            };

            const markdownImageRegex = /!\[[^\]]*]\((https?:\/\/[^)\s]+|data:image\/[^)]+)\)/g;
            let match;
            while ((match = markdownImageRegex.exec(text)) !== null) {
                addImage(match[1]);
            }

            const directUrlRegex = /(https?:\/\/[^\s)]+|data:image\/[A-Za-z0-9.+-]+;base64,[A-Za-z0-9+/=]+)/g;
            while ((match = directUrlRegex.exec(text)) !== null) {
                addImage(match[1]);
            }

            return images;
        }

        function downloadImage(url) {
            const imageUrl = String(url || '').trim();
            if (!imageUrl) return;

            if (isAndroidApk() && window.BeckonStarsAndroid?.saveImageToGallery) {
                window.BeckonStarsAndroid.saveImageToGallery(imageUrl);
                return;
            }

            try {
                const link = document.createElement('a');
                link.href = imageUrl;
                link.download = `ai-generated-${Date.now()}.jpg`;
                link.rel = 'noopener';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showMessage('✅ 圖片已開始下載到您的設備。');
            } catch (err) {
                console.error('Download failed', err);
                showMessage('下載失敗，請長按圖片保存。');
            }
        }

        async function shareGeneratedImageUrl(url) {
            const imageUrl = String(url || '').trim();
            if (!imageUrl) return;

            if (isAndroidApk() && window.BeckonStarsAndroid?.shareAIImage) {
                window.BeckonStarsAndroid.shareAIImage(imageUrl);
                return;
            }

            if (navigator.share) {
                try {
                    if (isRemoteUrl(imageUrl)) {
                        await navigator.share({
                            title: 'AI 生成圖片',
                            url: imageUrl
                        });
                        return;
                    }

                    if (isImageDataUrl(imageUrl)) {
                        const base64Data = imageUrl.split(',')[1];
                        const byteCharacters = atob(base64Data);
                        const byteNumbers = new Array(byteCharacters.length);
                        for (let i = 0; i < byteCharacters.length; i++) {
                            byteNumbers[i] = byteCharacters.charCodeAt(i);
                        }
                        const byteArray = new Uint8Array(byteNumbers);
                        const mime = imageUrl.match(/^data:([^;,]+)/)?.[1] || 'image/jpeg';
                        const blob = new Blob([byteArray], { type: mime });
                        const ext = mime.includes('png') ? 'png' : mime.includes('webp') ? 'webp' : 'jpg';
                        const file = new File([blob], `ai-image-${Date.now()}.${ext}`, { type: mime });

                        if (!navigator.canShare || navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: 'AI 生成圖片'
                            });
                            return;
                        }
                    }
                } catch (err) {
                    if (err?.name === 'AbortError') return;
                    console.error('Share failed', err);
                }
            }

            if (isRemoteUrl(imageUrl) && navigator.clipboard?.writeText) {
                try {
                    await navigator.clipboard.writeText(imageUrl);
                    showMessage('已複製圖片鏈接，可以貼到其他 App 分享。');
                    return;
                } catch (err) {
                    console.warn('Copy image URL failed', err);
                }
            }

            showMessage('分享失敗，請先保存圖片後再分享。');
        }

        function getMessageImageSrc(message) {
            return resolveMediaUrl(message?.thumbnailUrl || message?.imgUrl || message?.img || '');
        }

        function getMessageAudioSrc(message) {
            return resolveMediaUrl(message?.audioUrl || message?.audio || '');
        }

        function createDefaultDailyMessageReward() {
            return {
                count: 0,
                threshold: 20,
                remaining: 20,
                active: false,
                frameId: null,
                frameUrl: 'avatar-frame-daily.png',
                members: {},
                dateKey: ''
            };
        }

        function mergeDailyMessageReward(patch = {}) {
            const previous = state.dailyMessageReward || createDefaultDailyMessageReward();
            const threshold = Number(patch.threshold ?? previous.threshold ?? 20);
            const count = Math.max(0, Number(patch.count ?? previous.count ?? 0));
            const active = count >= threshold || Boolean(patch.active);
            const frameUrl = patch.frameUrl ?? previous.frameUrl ?? 'avatar-frame-daily.png';
            const next = {
                ...previous,
                ...patch,
                count,
                threshold,
                remaining: Math.max(threshold - count, 0),
                active,
                frameUrl,
                frameId: patch.frameId ?? (active ? (previous.frameId || 'daily-message-avatar-frame') : null),
                members: patch.members ?? previous.members ?? {},
                dateKey: patch.dateKey ?? previous.dateKey ?? ''
            };
            state.dailyMessages = count;
            state.dailyMessageReward = next;
            return next;
        }

        function getRewardStatusForCurrentUser(status) {
            if (!status) return null;
            if (status.currentUser) return status.currentUser;
            if (state.authUid && status.members?.[state.authUid]) return status.members[state.authUid];
            return null;
        }

        function updateDailyMessageRewardStatus(status) {
            if (!status) return { activeChanged: false, countChanged: false };
            const previousActive = !!state.dailyMessageReward?.active;
            const previousCount = Number(state.dailyMessageReward?.count || 0);
            const previousDateKey = state.dailyMessageReward?.dateKey || '';
            const current = getRewardStatusForCurrentUser(status) || {};
            const reward = status.reward || {};
            const threshold = Number(current.threshold || reward.threshold || state.dailyMessageReward?.threshold || 20);
            const count = Number(current.count || 0);
            mergeDailyMessageReward({
                count,
                threshold,
                active: !!current.active,
                frameId: current.frameId || null,
                frameUrl: current.frameUrl || reward.frameUrl || state.dailyMessageReward?.frameUrl || 'avatar-frame-daily.png',
                members: status.members || {},

        function formatVoiceTime(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = String(safeSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function getVoiceDurationSeconds(message) {
            return Math.max(0, Math.round((Number(message?.audioDurationMs) || 0) / 1000));
        }

        function getVoiceAudio() {
            if (voicePlayback.audio) return voicePlayback.audio;

            const audio = new Audio();
            audio.preload = 'metadata';
            audio.addEventListener('loadedmetadata', () => {
                if (Number.isFinite(audio.duration)) voicePlayback.duration = audio.duration;
                syncVoicePlayerUi();
            });
            audio.addEventListener('timeupdate', () => {
                voicePlayback.currentTime = audio.currentTime || 0;
                if (Number.isFinite(audio.duration)) voicePlayback.duration = audio.duration;
                syncVoicePlayerUi();
            });
            audio.addEventListener('play', () => {
                voicePlayback.isPlaying = true;
                syncVoicePlayerUi();
            });
            audio.addEventListener('pause', () => {
                voicePlayback.isPlaying = false;
                syncVoicePlayerUi();
            });
            audio.addEventListener('ended', () => {
                voicePlayback.isPlaying = false;
                voicePlayback.currentTime = 0;
                try {
                    audio.currentTime = 0;
                } catch (error) {}
                syncVoicePlayerUi();
            });
            voicePlayback.audio = audio;
            return audio;
        }

        async function toggleVoiceMessage(messageId) {
            const id = String(messageId || '');
            const message = state.messages.find(item => String(item.id) === id);
            const audioSource = getMessageAudioSrc(message);
            if (!audioSource) {
                showMessage('錄音檔未同步，暫時不能播放。');
                return;
            }

            const audio = getVoiceAudio();
            if (voicePlayback.messageId === id && !audio.paused) {
                audio.pause();
                return;
            }

            if (voicePlayback.messageId !== id) {
                audio.pause();
                voicePlayback.messageId = id;
                voicePlayback.duration = getVoiceDurationSeconds(message);
                voicePlayback.currentTime = 0;
                audio.src = audioSource;
                try {
                    audio.currentTime = 0;
                } catch (error) {}
            }

            try {
                await audio.play();
            } catch (error) {
                console.warn('Voice playback failed', error);
                voicePlayback.isPlaying = false;
                syncVoicePlayerUi();
                showMessage('錄音播放失敗，請稍後再試。');
            }
        }

        function seekVoiceMessage(messageId, ratio) {
            const id = String(messageId || '');
            const message = state.messages.find(item => String(item.id) === id);
            const audioSource = getMessageAudioSrc(message);
            if (!audioSource) return;

            const audio = getVoiceAudio();
            if (voicePlayback.messageId !== id) {
                audio.pause();
                voicePlayback.messageId = id;
                voicePlayback.duration = getVoiceDurationSeconds(message);
                voicePlayback.currentTime = 0;
                audio.src = audioSource;
            }

            const duration = voicePlayback.duration || getVoiceDurationSeconds(message);
            if (!duration) return;

            const nextTime = Math.min(duration, Math.max(0, duration * ratio));
            try {
                audio.currentTime = nextTime;
            } catch (error) {}
            voicePlayback.currentTime = nextTime;
            syncVoicePlayerUi();
        }

        async function serverApi(path, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };
            if (state.authToken) {
                headers['Authorization'] = `Bearer ${state.authToken}`;
            }
            const response = await fetch(`${selfHostedApiBase}${path}`, {
                ...options,
                headers
            });
            const payload = response.status === 204 ? null : await response.json().catch(() => null);
            if (!response.ok) {
                const error = new Error(`server-${response.status}`);
                error.status = response.status;
                error.code = payload?.error || '';
                error.serverMessage = payload?.message || '';
                throw error;
            }
            return payload;
        }

        async function fetchCachedDateResource(dateStr, cache, requests, loadResource) {
            const key = dateStr || 'today';
            if (cache[key]) return cache[key];
            if (requests[key]) return requests[key];
            requests[key] = (async () => {
                try {
                    const data = await loadResource(key);
                    if (data) cache[key] = data;
                    return data;
                } finally {
                    delete requests[key];
                }
            })();
            return requests[key];
        }

        function getDailyBibleVerseTarget(dateStr) {
            const verses = [
                { chineses: '約', bid: 43, chapter: 3, verse: 16, reference: '約翰福音 3:16' },
                { chineses: '詩', bid: 19, chapter: 23, verse: 1, reference: '詩篇 23:1' },
                { chineses: '羅', bid: 45, chapter: 12, verse: 12, reference: '羅馬書 12:12' },
                { chineses: '腓', bid: 50, chapter: 4, verse: 6, reference: '腓立比書 4:6' },
                { chineses: '賽', bid: 23, chapter: 41, verse: 10, reference: '以賽亞書 41:10' },
                { chineses: '箴', bid: 20, chapter: 3, verse: 5, reference: '箴言 3:5' },
                { chineses: '太', bid: 40, chapter: 5, verse: 9, reference: '馬太福音 5:9' }
            ];
            const seed = String(dateStr || new Date().toISOString().slice(0, 10));
            let hash = 0;
            for (let i = 0; i < seed.length; i++) hash = ((hash * 31) + seed.charCodeAt(i)) >>> 0;
            return verses[hash % verses.length];
        }

        async function fetchFhlBibleVerse(dateStr) {
            const target = getDailyBibleVerseTarget(dateStr);
            const params = new URLSearchParams({
                chineses: target.chineses,
                chap: String(target.chapter),
                sec: String(target.verse),
                version: 'unv',
                gb: '0'
            });
            const sourceUrl = `https://bible.fhl.net/json/qb.php?${params.toString()}`;
            const response = await fetch(sourceUrl);
            if (!response.ok) throw new Error(`fhl-${response.status}`);
            const data = await response.json();
            const record = data.record && data.record[0];
            if (data.status !== 'success' || !record || !record.bible_text) throw new Error('fhl-empty-verse');
            return {
                ok: true,
                translation: data.version || 'unv',
                versionName: data.v_name || 'FHL和合本',
                book: target.bid,
                chapter: record.chap || target.chapter,
                verse: record.sec || target.verse,
                reference: `${target.reference}`,
                text: String(record.bible_text || '').replace(/\s+/g, ' ').trim(),
                source: '信望愛站聖經',
                sourceUrl
            };
        }

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function compressImage(file, maxSize = 256, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            const ratio = Math.min(maxSize / w, maxSize / h);
                            w = Math.round(w * ratio);
                            h = Math.round(h * ratio);
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = reader.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // AI 圖片專用壓縮：800px 寬、質量 0.7，約 100-200KB
        function compressAIRefImage(file, maxSize = 800, quality = 0.7) {

        async function refreshServerMessages(familyId) {
            const result = await serverApi(`/api/families/${encodeURIComponent(familyId)}/messages`);
            const rewardUpdate = updateDailyMessageRewardStatus(result?.rewards?.dailyMessageFrame);
            const incoming = (result.messages || []).map(message => normalizeCloudMessage(message.id, message));
            const knownIds = new Set(state.messages.map(message => String(message.id)));
            if (hasLoadedCloudMessages) {
                incoming.forEach(message => {
                    if (!knownIds.has(String(message.id)) && message.senderId !== state.authUid && document.hidden) {
                        showLocalNotification(`星喚：${message.senderName}`, message.content || '你有新的家庭訊息');
                    }
                });
            }
            const changed = incoming.length !== state.messages.length || incoming.some((message, index) => {
                const current = state.messages[index];
                return !current
                    || String(message.id) !== String(current.id)
                    || getMessageRenderKey(message) !== getMessageRenderKey(current);
            });
            if (changed) state.messages = incoming;
            const wasInitialSync = !hasLoadedCloudMessages;
            hasLoadedCloudMessages = true;
            if (state.appReady && maybeShowDailyRewardCelebration(rewardUpdate, { skipIfInitialSync: wasInitialSync })) {
                render();
                return;
            }
            if (rewardUpdate.activeChanged && state.appReady) {
                render();
                return;
            }
            if (changed) refreshVisibleContent();
        }

                incoming.forEach(memory => {
                    if (!knownIds.has(String(memory.id)) && memory.uid !== state.authUid) {
                        showLocalNotification(`星喚新回憶：${memory.childName}`, memory.content || '有人記錄了新回憶');
                        if (!document.hidden) {
                            showMessage(`${memory.childName} 剛記錄了新回憶！`);
                        }
                    }
                });
            }
            const changed = incoming.length !== state.memories.length || (incoming.length > 0 && incoming[incoming.length - 1].id !== state.memories[state.memories.length - 1]?.id);
            if (changed) state.memories = incoming;
            hasLoadedCloudMemories = true;
            if (changed) refreshVisibleContent();
        }

        function subscribeFamilyMemories(familyId) {
            if (unsubscribeMemories) unsubscribeMemories();
            refreshServerMemories(familyId).catch(error => {
                console.warn('Server memory sync failed', error);
            });
            const timer = setInterval(() => refreshServerMemories(familyId).catch(error => {
                console.warn('Server memory sync failed', error);
            }), 5000);
            unsubscribeMemories = () => clearInterval(timer);
        }

        function normalizeCloudMemory(id, data) {
            const date = data.createdAt?.toDate ? data.createdAt.toDate() : (data.createdAt ? new Date(data.createdAt) : new Date());
            return {
                id,
                date: data.date || date.getDate(),
                month: data.month || (date.getMonth() + 1),
                year: data.year || date.getFullYear(),
                uid: data.uid || '',
                childId: data.childId || data.uid || 'member',
                childName: data.childName || '家庭成員',
                type: data.type || 'text',
                content: data.content || '',
                img: data.img || null,
                imgUrl: data.imgUrl || null,
                thumbnailUrl: data.thumbnailUrl || null
            };
        }

        // --- 局部刷新（避免全頁閃屏） ---
        function getMessageRenderKey(msg) {
            return [
                msg.id,
                msg.senderId,
                msg.senderName,
                msg.type,
                msg.content,
                msg.img || msg.imgUrl || msg.thumbnailUrl || '',
                msg.audio || msg.audioUrl || '',
                msg.audioDurationMs || 0,
                msg.transcript || '',
                msg.aiSummary || '',
                getAvatarFrameForUser(msg.senderId || msg.uid || ''),
                state.transcribingMessageId === String(msg.id) ? 'transcribing' : ''
            ].map(value => String(value ?? '')).join('|');
        }

        function createChatMessageElement(msg, disableAnimation = false) {
            const isMe = msg.senderId === state.authUid || msg.uid === state.authUid;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = renderSingleChatMessage(msg, isMe);
            const el = tempDiv.firstElementChild;
            if (disableAnimation) {
                el.classList.remove('animate-fadeIn');
            }
            return el;
        }

        function refreshVisibleContent() {
            // 更新聊天訊息（增量追加，避免閃爍）
            if (state.currentTab === 'chat') {
                const chatMessages = document.getElementById('chatMessages');
                if (chatMessages) {
                    const visibleMessages = state.messages;
                    const existingMsgs = chatMessages.querySelectorAll('[data-msg-id]');
                    const existingById = new Map(Array.from(existingMsgs).map(el => [el.getAttribute('data-msg-id'), el]));
                    const visibleIds = new Set(visibleMessages.map(msg => String(msg.id)));
                    const anchor = document.getElementById('chatBottomAnchor');
                    const shouldAutoScroll = !isUserScrolledUp();

                    // 追加新訊息，並替換已轉譯/已總結的同一條訊息。
                    let touched = 0;
                    existingById.forEach((element, id) => {
                        if (!visibleIds.has(String(id))) {
                            element.remove();
                            touched++;
                        }
                    });
                    for (const msg of visibleMessages) {
                        const messageId = String(msg.id);
                        const existing = existingById.get(messageId);
                        const nextKey = getMessageRenderKey(msg);
                        if (existing) {
                            if (existing.getAttribute('data-msg-key') !== nextKey) {
                                const replacement = createChatMessageElement(msg, true);
                                if (replacement) {
                                    existing.replaceWith(replacement);
                                    touched++;
                                }
                            }
                            continue;
                        }
                        const newEl = createChatMessageElement(msg, true);
                        if (newEl && anchor) {
                            chatMessages.insertBefore(newEl, anchor);
                            touched++;
                        }
                    }

                    if (touched > 0) {
                        syncVoicePlayerUi();
                        if (shouldAutoScroll) {
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }
                    }
                }
            }
            // 更新「我」頁內的家庭成員活躍度列表
            if (state.currentTab === 'profile') {
                const lb = document.getElementById('familyMemberActivityCard');
                if (lb) {
                    lb.outerHTML = renderLeaderboardCard();
                }
            }
            // 更新日曆回憶
            if (state.currentTab === 'calendar' && state.calendarMode === 'tear-off') {
                updateCalendarContent();
            }
        }

        function appendMessageToChat(msg) {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;
            const anchor = document.getElementById('chatBottomAnchor');
            const shouldAutoScroll = !isUserScrolledUp();
            const newEl = createChatMessageElement(msg);
            if (newEl && anchor) {
                chatMessages.insertBefore(newEl, anchor);
                syncVoicePlayerUi();
                if (shouldAutoScroll) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }
        }

        function isUserScrolledUp() {
            const container = getChatMessagesContainer();
            if (!container) return false;
            return container.scrollHeight - container.scrollTop - container.clientHeight > 80;
        }

        function renderSingleChatMessage(msg, isMe) {
            const displayAvatar = isMe ? state.userAvatar : ((msg.senderName || '家')[0] || '👤');
            const displayName = isMe ? state.userName : (msg.senderName || '家庭成員');
            const messageId = String(msg.id);
            const senderUserId = msg.senderId || msg.uid || '';
            const imageSrc = getMessageImageSrc(msg);
            const audioSrc = getMessageAudioSrc(msg);
            return `
                <div data-msg-id="${escapeAttribute(messageId)}" data-msg-key="${escapeAttribute(getMessageRenderKey(msg))}" class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                    ${!isMe ? renderAvatar(displayAvatar, { userId: senderUserId, sizeClass: 'w-10 h-10', coreClass: 'bg-orange-200 text-brand-dark font-bold bs-text-xl', extraClass: 'mr-2' }) : ''}
                    <div class="max-w-[75%] flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        ${!isMe ? `<span class="bs-text-xs text-gray-500 mb-1 ml-1">${displayName}</span>` : ''}
                        <div class="p-3 rounded-2xl shadow-sm ${isMe ? 'bg-brand text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'}">
                            ${msg.type === 'text' ? `<p class="bs-text-lg">${msg.content}</p>` : ''}
                            ${msg.type === 'photo' && imageSrc ? `<img src="${escapeAttribute(imageSrc)}" class="max-w-56 max-h-56 rounded-xl object-cover">${msg.content ? `<p class="bs-text-base mt-2">${msg.content}</p>` : ''}` : ''}
                            ${msg.type === 'audio' ? `<div class="space-y-2 w-60 max-w-[68vw]">${renderVoicePlayer(msg, isMe)}<div class="${isMe ? 'bg-white/10' : 'bg-gray-50'} rounded-xl p-2"><p class="bs-text-xs opacity-70 mb-1">語音轉譯</p>${msg.transcript ? `<p class="bs-text-base">${msg.transcript}</p>` : `<p class="bs-text-sm opacity-80">未取得轉譯文字，可播放錄音確認內容。</p>`}</div></div>` : ''}
                        </div>
                        ${msg.type === 'audio' && msg.transcript && !msg.aiSummary && state.backendMode === 'server' ? `
                            <button class="action-btn mt-2 bg-blue-50 border border-blue-100 text-blue-700 rounded-xl px-3 py-2 bs-text-sm font-bold" data-action="summarizeVoice" data-message-id="${escapeAttribute(messageId)}">
                                <i class="fa-solid fa-wand-magic-sparkles mr-1"></i>總結錄音
                            </button>
                        ` : ''}
                        ${msg.type === 'audio' && msg.audio && !msg.transcript && state.backendMode === 'server' ? `
                            <button class="action-btn mt-2 bg-amber-50 border border-amber-100 text-amber-700 rounded-xl px-3 py-2 bs-text-sm font-bold disabled:opacity-60" data-action="transcribeVoice" data-message-id="${escapeAttribute(messageId)}" ${state.transcribingMessageId === messageId ? 'disabled' : ''}>
                                <i class="fa-solid ${state.transcribingMessageId === messageId ? 'fa-spinner fa-spin' : 'fa-closed-captioning'} mr-1"></i>${state.transcribingMessageId === messageId ? 'AI 轉譯中' : 'AI 轉譯錄音'}
                            </button>
                        ` : ''}
                        ${msg.aiSummary ? `
                            <div class="mt-2 bg-blue-50 border border-blue-100 rounded-xl p-3 shadow-sm relative w-full">
                                <div class="absolute -top-2 -left-2 bg-blue-500 text-white w-6 h-6 rounded-full flex items-center justify-center bs-text-xs shadow-md">
                                    <i class="fa-solid fa-robot"></i>
                                </div>
                                <p class="bs-text-sm text-blue-800 pl-3 font-medium">${msg.aiSummary}</p>
                            </div>
                        ` : ''}
                        <span class="bs-text-xs text-gray-400 mt-1 ${isMe ? 'mr-1' : 'ml-1'}">${msg.time}</span>
                    </div>
                </div>
            `;
        }

        function renderChatMessages() {
            const visibleMessages = state.messages;
            return `
                <div class="text-center bs-text-xs text-gray-400 mb-4">今天</div>
                ${visibleMessages.map(msg => {
                    const isMe = msg.senderId === state.authUid || msg.uid === state.authUid;
                    return renderSingleChatMessage(msg, isMe);
                }).join('')}
            `;
        }

        function renderLeaderboardCard() {
            const memberScores = {};
            state.messages.forEach(msg => {
                const key = msg.senderId || msg.uid || 'unknown';
                if (!memberScores[key]) {
                    memberScores[key] = { id: key, name: msg.senderName || '家庭成員', avatar: (msg.senderName || '家')[0], score: 0, messageCount: 0 };
                }
                memberScores[key].score += 10;
                memberScores[key].messageCount++;
            });
            state.memories.forEach(mem => {
                const key = mem.uid || mem.childId || 'unknown';
                if (!memberScores[key]) {
                    memberScores[key] = { id: key, name: mem.childName || '家庭成員', avatar: (mem.childName || '家')[0], score: 0, messageCount: 0 };
                }
                memberScores[key].score += 15;
            });
            const sorted = Object.values(memberScores).sort((a, b) => b.score - a.score);
            if (sorted.length === 0) {
                return `<div id="familyMemberActivityCard" class="bg-white rounded-3xl shadow-sm overflow-hidden"><div class="flex flex-col items-center justify-center py-12 px-6 text-center"><div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-users bs-text-3xl text-brand"></i></div><h3 class="bs-text-xl font-bold text-gray-800 mb-2">暫未有家庭互動</h3><p class="text-gray-500">開始聊天和分享回憶後，家庭成員活躍度會自動更新。</p></div></div>`;
            }
            const rankIcons = ['👑', '2', '3'];
            const subtitles = ['本週互動最熱烈！', '繼續保持～', '加油追上去！'];
            const rankItems = sorted.map((member, index) => {
                const rank = index + 1;
                const icon = rank <= 3 ? rankIcons[index] : String(rank);
                const subtitle = rank <= 3 ? subtitles[index] : (member.messageCount > 0 ? `${member.messageCount} 則訊息` : '潛水中...');
                const avatarBg = rank === 1 ? 'bg-[#f6d1aa] text-[#b66122]' : (rank <= 3 ? 'bg-orange-100 text-brand-dark' : 'bg-gray-100 text-gray-500');
                return `<div class="flex items-center py-4 px-5 border-b border-gray-50"><div class="w-8 text-center mr-4 ${rank <= 3 ? (rank===1?'bs-text-2xl text-yellow-400':rank===2?'bs-text-xl text-gray-400':'bs-text-lg text-amber-600') : 'bs-text-base text-gray-400'} font-bold">${icon}</div>${renderAvatar(member.avatar, { userId: member.id, sizeClass: 'w-12 h-12', coreClass: `${avatarBg} bs-text-xl font-bold`, extraClass: 'mr-4' })}<div class="flex-1"><div class="font-bold text-gray-800 bs-text-base">${member.name}</div><div class="bs-text-xs text-gray-400">${subtitle}</div></div><div class="text-right"><div class="bs-text-lg font-bold text-brand">${member.score.toLocaleString()}</div><div class="bs-text-xs text-gray-400">分</div></div></div>`;
            }).join('');
            return `<div id="familyMemberActivityCard" class="bg-white rounded-3xl shadow-sm overflow-hidden">${rankItems}</div>`;
        }

        // --- 核心渲染引擎 ---
        function render() {
            const app = document.getElementById('app');
            const previousChatSnapshot = readChatScrollSnapshot();
            if (state.currentTab === 'leaderboard') state.currentTab = 'profile';
            saveDemoData();
            
            if (!state.appReady) {
                app.innerHTML = renderOnboardingFlow();
            } else if (state.aiImageGenView) {
                app.innerHTML = renderAIImageGen() + renderModals();
            } else {
                app.innerHTML = `
                    ${renderHeader()}
                    <main class="flex-1 min-h-0 ${state.currentTab === 'chat' ? 'overflow-hidden pb-[calc(5.75rem+env(safe-area-inset-bottom))]' : 'overflow-y-auto no-scrollbar pb-[calc(5.75rem+env(safe-area-inset-bottom))]'}">
                        ${state.currentTab === 'calendar' ? renderCalendar() : ''}
                        ${state.currentTab === 'chat' ? renderChat() : ''}
                        ${state.currentTab === 'rewards' ? renderRewards() : ''}
                        ${state.currentTab === 'profile' ? renderProfile() : ''}
                    </main>
                    ${renderBottomNav()}
                    ${renderModals()}
                `;
            }
            attachEvents();
            requestAnimationFrame(() => {
                applyChatScrollAfterRender(previousChatSnapshot);
                restoreChatInputFocusAfterRender();
                syncVoicePlayerUi();
                initVideoPlayer();
            });
        }

        // --- 登入/註冊引導流程 (Onboarding) ---
        function renderOnboardingFlow() {
            if (state.onboardingStep === 1) return renderStep1Auth();
            if (state.onboardingStep === 2) return renderStep2Role();
            if (state.onboardingStep === 3) return renderStep3Profile();
            if (state.onboardingStep === 4) return renderStep4Connect();
        }

        // 步驟 1: 登入/註冊
        function renderStep1Auth() {
            const isLogin = state.authMode === 'login';
            return `
                <div class="flex flex-col items-center justify-center h-full p-8 bg-gradient-to-b from-[#FFF8F0] to-[#FFE5D0] animate-fadeIn overflow-y-auto">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-4">
                        <i class="fa-solid fa-star bs-text-4xl text-brand"></i>
                    </div>
                    <h1 class="bs-text-3xl font-bold text-gray-800 mb-1 tracking-wider">星喚</h1>
                    <p class="bs-text-base text-gray-600 mb-6">Beckon Stars</p>

                    <div class="w-full max-w-sm">
                        <div class="flex mb-6 bg-gray-100 rounded-xl p-1">
                            <button class="action-btn flex-1 py-2 rounded-lg bs-text-sm font-medium transition-colors ${isLogin ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500'}" data-action="switchAuthMode" data-mode="login">登入</button>
                            <button class="action-btn flex-1 py-2 rounded-lg bs-text-sm font-medium transition-colors ${!isLogin ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500'}" data-action="switchAuthMode" data-mode="register">註冊</button>
                        </div>

                        <div class="mb-4">
                            <button class="action-btn w-full min-h-[44px] bg-white text-gray-700 bs-text-base font-bold py-3 px-6 rounded-xl border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors flex items-center justify-center gap-3" data-action="androidGoogleLogin" ${state.googleSignInLoading ? 'disabled' : ''}>
                                <i class="fa-brands fa-google text-red-500"></i>
                                <span>${state.googleSignInLoading ? 'Google 登入中...' : '使用 Google 登入'}</span>
                            </button>
                        </div>

                        <div class="flex items-center gap-3 mb-4">
                            <div class="h-px bg-gray-200 flex-1"></div>
                            <span class="bs-text-xs text-gray-400">或使用電郵</span>
                            <div class="h-px bg-gray-200 flex-1"></div>
                        </div>

                        ${!isLogin ? `
                        <div class="mb-3">
                            <input id="authName" type="text" placeholder="用戶名稱" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" autocomplete="name">
                        </div>
                        ` : ''}

                        <div class="mb-3">
                            <input id="authEmail" type="email" placeholder="電郵地址" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" autocomplete="email">
                        </div>

                        <div class="mb-4">
                            <input id="authPassword" type="password" placeholder="密碼" class="w-full px-4 py-3 rounded-xl border border-gray-200 bs-text-base focus:outline-none focus:border-brand bg-white" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
                        </div>

                        <button class="action-btn w-full bg-brand text-white bs-text-lg font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition-opacity" data-action="${isLogin ? 'login' : 'register'}">
                            ${isLogin ? '登入' : '註冊'}
                        </button>

                        ${state.errorMsg ? `<p class="text-red-500 bs-text-sm mt-3 text-center animate-shake">${state.errorMsg}</p>` : ''}

                        <p class="bs-text-xs text-gray-400 text-center mt-4">${isLogin ? '還沒有帳號？' : '已有帳號？'} <button class="action-btn text-brand font-medium" data-action="switchAuthMode" data-mode="${isLogin ? 'register' : 'login'}">${isLogin ? '立即註冊' : '返回登入'}</button></p>
                    </div>
                </div>
            `;
        }

        // 步驟 2: 選擇角色
        function renderStep2Role() {
            return `
                <div class="flex flex-col items-center justify-center h-full p-8 text-center bg-gradient-to-b from-[#FFF8F0] to-[#FFE5D0] animate-fadeIn">
                    <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-lg mb-6">
                        <i class="fa-solid fa-star text-5xl text-brand"></i>
                    </div>
                    <h1 class="bs-text-4xl font-bold text-gray-800 mb-2 tracking-wider">星喚</h1>
                    <p class="bs-text-lg text-gray-600 mb-10">Beckon Stars</p>
                    
                    <h2 class="bs-text-xl font-medium text-gray-700 mb-6">請選擇您的身份</h2>
                    
                    <button class="action-btn w-full bg-brand text-white bs-text-xl font-bold py-4 px-6 rounded-2xl shadow-md mb-4 hover:bg-brand-dark transition-colors" data-action="setRole" data-role="senior">
                        <i class="fa-solid fa-person-cane mr-2"></i> 我是長者
                    </button>
                    <button class="action-btn w-full bg-white text-brand border-2 border-brand bs-text-xl font-bold py-4 px-6 rounded-2xl shadow-sm hover:bg-orange-50 transition-colors" data-action="setRole" data-role="child">
                        <i class="fa-solid fa-children mr-2"></i> 我是子女
                    </button>
                </div>
            `;
        }

        // 步驟 2: 設定檔案
        function renderStep3Profile() {
            const avatarOptions = state.role === 'senior' ? avatars.senior : avatars.child;
            if (!state.userAvatar || !avatarOptions.includes(state.userAvatar)) {
                state.userAvatar = avatarOptions[0]; // 設置預設頭像
            }

            return `
                <div class="flex flex-col h-full p-8 bg-[#FFF8F0] animate-fadeIn">
                    <button class="action-btn self-start text-gray-400 mb-6 bs-text-xl" data-action="backStep" data-step="1">

                                ${avatar}
                            </button>

                    </div>

                    <!-- 稱呼輸入 -->
                    <div class="mb-8 relative">
                        <label class="block text-gray-700 font-bold mb-2">您的稱呼</label>
                        <input type="text" id="nameInput" value="${state.userName}" placeholder="例如: ${state.role === 'senior' ? '媽媽, 爺爺' : '阿強, 妹妹'}" class="w-full bs-text-xl p-4 rounded-2xl border-2 ${state.errorMsg ? 'border-red-400' : 'border-gray-200'} focus:border-brand outline-none bg-white">

                    </div>

                    <div class="flex-1"></div>
                    <button class="action-btn w-full bg-brand text-white bs-text-xl font-bold py-4 rounded-2xl shadow-lg hover:bg-brand-dark transition-colors" data-action="submitProfile">
                        下一步 <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            `;
        }

        // 步驟 3: 綁定日曆
        function renderStep4Connect() {
            if (!state.connectionMode || state.connectionMode === 'select') {
                return `
                    <div class="flex flex-col h-full p-8 bg-[#FFF8F0] animate-fadeIn">
                        <button class="action-btn self-start text-gray-400 mb-6 bs-text-xl" data-action="backStep" data-step="2">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 class="bs-text-3xl font-bold text-gray-800 mb-2">加入共用日曆</h2>
                        <p class="text-gray-500 mb-10">與家人連結，隨時隨地分享生活點滴。</p>
                        
                        <div class="space-y-6">
                            <button class="action-btn w-full bg-white border-2 border-brand p-6 rounded-3xl shadow-sm text-left flex items-center hover:bg-orange-50 transition-colors" data-action="setConnectionMode" data-mode="create">
                                <div class="w-14 h-14 rounded-full bg-orange-100 text-brand flex items-center justify-center bs-text-2xl mr-4 shrink-0">
                                    <i class="fa-solid fa-house-chimney-medical"></i>
                                </div>
                                <div>
                                    <h3 class="bs-text-xl font-bold text-gray-800">建立新日曆</h3>
                                    <p class="bs-text-sm text-gray-500 mt-1">產生一組數字邀請家人加入</p>
                                </div>
                            </button>

                            <button class="action-btn w-full bg-white border-2 border-gray-200 p-6 rounded-3xl shadow-sm text-left flex items-center hover:bg-gray-50 transition-colors" data-action="setConnectionMode" data-mode="join">
                                <div class="w-14 h-14 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center bs-text-2xl mr-4 shrink-0">
                                    <i class="fa-solid fa-right-to-bracket"></i>
                                </div>
                                <div>
                                    <h3 class="bs-text-xl font-bold text-gray-800">加入現有日曆</h3>

                                </div>
                            </button>

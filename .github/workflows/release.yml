name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v0.1.0-alpha)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build Release APK
      working-directory: ./android
      run: ./gradlew assembleDebug -i

    - name: Extract version and pre-release status
      id: version
      run: |
        TAG_NAME="${{ github.ref_name }}"
        if [[ -z "$TAG_NAME" ]]; then
          TAG_NAME="${{ github.event.inputs.tag_name }}"
        fi
        
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        
        # Check if it's a pre-release (contains alpha, beta, rc, etc.)
        if [[ $TAG_NAME =~ (alpha|beta|rc|pre) ]]; then
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
          echo "title=Pre-Release: $TAG_NAME" >> $GITHUB_OUTPUT
        else
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
          echo "title=Release: $TAG_NAME" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        release_name: ${{ steps.version.outputs.title }}
        draft: false
        prerelease: ${{ steps.version.outputs.is_prerelease }}
        body: |
          ## 星喚 Beckon Stars ${{ steps.version.outputs.tag_name }}
          
          ### 📱 APK 下載
          - [星喚 Debug APK](/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/app-debug.apk)
          
          ### 📝 更新日誌
          請查看 [提交日誌](/${{ github.repository }}/commits/${{ steps.version.outputs.tag_name }})
          
          ### 🚀 安裝方法
          ```bash
          adb install -r app-debug.apk
          adb shell am start -n hk.beckonstars.app/.MainActivity
          ```
          
          ### ⚠️ 預發布版本說明
          此版本為預發布版本，可能存在已知問題。
          
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: android/app/build/outputs/apk/debug/app-debug.apk
        asset_name: app-debug.apk
        asset_content_type: application/vnd.android.package-archive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release created successfully
      run: |
        echo "✅ Release created: ${{ steps.version.outputs.tag_name }}"
        echo "📍 Pre-release: ${{ steps.version.outputs.is_prerelease }}"
        echo "🔗 Release URL: ${{ steps.create_release.outputs.html_url }}"

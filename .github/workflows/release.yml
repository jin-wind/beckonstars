name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    env:
      APK_PATH: android/app/build/outputs/apk/debug/app-debug.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle
          cache-dependency-path: |
            android/gradle/wrapper/gradle-wrapper.properties
            android/**/*.gradle
            android/**/*.gradle.kts

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx2048m"
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Prepare release files
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ inputs.tag_name }}"
          fi

          if [[ -z "${tag_name}" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          safe_tag="${tag_name//\//-}"
          asset_name="beckon-stars-${safe_tag}.apk"

          mkdir -p release
          cp "${APK_PATH}" "release/${asset_name}"
          sha256sum "release/${asset_name}" > "release/${asset_name}.sha256"

          is_prerelease="false"
          if [[ "${{ github.event.inputs.prerelease }}" == "true" || "${tag_name}" =~ (alpha|beta|rc|pre) ]]; then
            is_prerelease="true"
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${is_prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.asset_name }}
          path: |
            release/${{ steps.release.outputs.asset_name }}
            release/${{ steps.release.outputs.asset_name }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: 星喚 ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.release.outputs.is_prerelease }}
          fail_on_unmatched_files: true
          files: |
            release/${{ steps.release.outputs.asset_name }}
            release/${{ steps.release.outputs.asset_name }}.sha256
          body: |
            ## APK 下載

            請從下方 Assets 下載 `${{ steps.release.outputs.asset_name }}`。

            ## 安裝方法

            ```bash
            adb install -r ${{ steps.release.outputs.asset_name }}
            adb shell am start -n hk.beckonstars.app/.MainActivity
            ```

            另附 SHA-256 checksum 檔案，可用於驗證 APK。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

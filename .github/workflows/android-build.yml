name: Android Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - 'icons/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582
      with:
        gradle-version: wrapper

    - name: Setup Node.js (for web asset sync)
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install npm dependencies
      run: npm install

    - name: Build web assets
      run: npm run build || echo "No build script found"

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build APK with Gradle
      run: cd android && ./gradlew assembleDebug

    - name: Build Release APK
      run: cd android && ./gradlew assembleRelease --stacktrace || echo "Release build requires signing configuration"
      continue-on-error: true

    - name: Get APK file info
      run: |
        echo "=== DEBUG APK ===" 
        ls -lh android/app/build/outputs/apk/debug/
        echo "=== RELEASE APK ===" 
        ls -lh android/app/build/outputs/apk/release/ || echo "No release APK found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      continue-on-error: true
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-status:
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-apk.result }}" == "success" ]; then
            echo "✅ APK build completed successfully"
            exit 0
          else
            echo "❌ APK build failed"
            exit 1
          fi

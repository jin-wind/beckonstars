name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        cache-dependency-path: 'android/gradle/wrapper/gradle-wrapper.properties'

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Print Gradle info
      run: cd android && ./gradlew --version

    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug -i

    - name: List build outputs
      run: |
        echo "=== Checking build outputs ==="
        find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        ls -la android/app/build/outputs/ || echo "Build outputs directory not found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: v${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        files: android/app/build/outputs/apk/debug/app-debug.apk
        body: |
          ${{ github.event.head_commit.message }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-status:
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()
    steps:
      - name: Report build status
        run: |
          if [ "${{ needs.build-apk.result }}" == "success" ]; then
            echo "✅ APK build completed successfully"
          else
            echo "❌ APK build failed"
            exit 1
          fi

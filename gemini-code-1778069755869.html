<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溫馨家庭 - 純排行榜</title>
<style>
    /* 基礎變數與重置 */
    :root {
        --bg-color: #fcf9f5;
        --card-bg: #ffffff;
        --primary-orange: #f58f53;
        --text-main: #333333;
        --text-muted: #999999;
        --avatar-bg: #f9dcb8;
        --avatar-text: #b66122;
        --border-radius-lg: 20px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body {
        background-color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center; /* 讓整個容器在畫面置中 */
        min-height: 100vh;
    }

    /* 模擬手機螢幕容器 */
    .app-container {
        width: 100%;
        max-width: 400px;
        background-color: var(--bg-color);
        height: 100vh;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    /* 主體區域 */
    .main-content {
        padding: 30px 20px;
    }

    .page-title {
        font-size: 24px;
        font-weight: bold;
        color: var(--text-main);
        margin-bottom: 20px;
    }

    /* 排行榜卡片 */
    .leaderboard-card {
        background-color: var(--card-bg);
        border-radius: var(--border-radius-lg);
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        padding: 10px 0;
    }

    .rank-item {
        display: flex;
        align-items: center;
        padding: 15px 20px;
        border-bottom: 1px solid #f0f0f0;
    }

    .rank-item:last-child {
        border-bottom: none;
    }

    /* 排名數字/獎牌 */
    .rank-number {
        width: 30px;
        font-size: 18px;
        font-weight: bold;
        color: var(--text-muted);
        text-align: center;
        margin-right: 15px;
    }

    .rank-1 .rank-number { color: #FFD700; font-size: 24px; } /* 金牌色 */
    .rank-2 .rank-number { color: #C0C0C0; font-size: 22px; } /* 銀牌色 */
    .rank-3 .rank-number { color: #CD7F32; font-size: 20px; } /* 銅牌色 */

    /* 用戶頭像 (文字頭像) */
    .user-avatar {
        width: 46px;
        height: 46px;
        background-color: var(--avatar-bg);
        color: var(--avatar-text);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        margin-right: 15px;
    }

    /* 第一名頭像底色微調 */
    .rank-1 .user-avatar { background-color: #f6d1aa; }

    /* 用戶資訊 */
    .user-info {
        flex-grow: 1;
    }

    .user-name {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-main);
        margin-bottom: 4px;
    }

    .user-subtitle {
        font-size: 12px;
        color: var(--text-muted);
    }

    /* 積分分數 */
    .user-score {
        font-size: 18px;
        font-weight: bold;
        color: var(--primary-orange);
        text-align: right;
    }

    .user-score span {
        font-size: 12px;
        font-weight: normal;
        color: var(--text-muted);
    }
</style>
</head>
<body>

<div class="app-container">
    <main class="main-content">
        <h1 class="page-title">活躍度排行榜</h1>
        
        <div class="leaderboard-card">
            
            <div class="rank-item rank-1">
                <div class="rank-number">👑</div>
                <div class="user-avatar">媽</div>
                <div class="user-info">
                    <div class="user-name">媽媽</div>
                    <div class="user-subtitle">本週互動最熱烈！</div>
                </div>
                <div class="user-score">1,250 <span>分</span></div>
            </div>

            <div class="rank-item rank-2">
                <div class="rank-number">2</div>
                <div class="user-avatar">我</div>
                <div class="user-info">
                    <div class="user-name">我</div>
                    <div class="user-subtitle">繼續保持～</div>
                </div>
                <div class="user-score">840 <span>分</span></div>
            </div>

            <div class="rank-item rank-3">
                <div class="rank-number">3</div>
                <div class="user-avatar">細</div>
                <div class="user-info">
                    <div class="user-name">細女 (阿妹)</div>
                    <div class="user-subtitle">週末提議行山好主意</div>
                </div>
                <div class="user-score">620 <span>分</span></div>
            </div>

            <div class="rank-item">
                <div class="rank-number">4</div>
                <div class="user-avatar" style="background-color: #e2e8f0; color: #64748b;">爸</div>
                <div class="user-info">
                    <div class="user-name">爸爸</div>
                    <div class="user-subtitle">潛水中...</div>
                </div>
                <div class="user-score">120 <span>分</span></div>
            </div>
            
        </div>
    </main>
</div>

</body>
</html>
